          if(!hasDoomSetup){
            const next = Object.assign({}, out);
            next.score = Math.min(next.score || 0, -8);
            next.warn = true;
            next.summary = '종말 파츠가 없으면 효율이 낮습니다';
            next.reasons = [...(next.reasons || []), '직접 종말을 쌓는 카드가 아직 없습니다'];
            next.chips = [...(next.chips || []), ['bad','선행 파츠 부족']];
            return next;
          }
        }
      }catch(e){}
      return out;
    };
  }
})();
</script>


<script id="search-ui-restore-and-pick-guard">
(function(){
  const oldRender = window.renderSearchGrid;
  const oldOpenSearch = window.openSearch;
  const oldOpenDeckAdd = window.openDeckAdd;
  let pickBusy = false;

  function buildProgressHtml(){
    if(typeof deckAddMode !== 'undefined' && deckAddMode) return '';
    if(typeof getNeedCount !== 'function') return '';
    const need = getNeedCount();
    if(!need) return '';
    let prog = '<div class="slot-progress">' + Array.from({length:need}, (_,i)=>{
      const colorless = (typeof mode!=='undefined' && mode==='shop' && typeof isShopColorlessSlot==='function' && isShopColorlessSlot(i)) ? ' colorless' : '';
      const on = i===activeSlot ? ' on' : '';
      return `<span class="slot-dot${on}${colorless}"></span>`;
    }).join('') + `<span class="slot-text">${(typeof getSlotLabel==='function' ? getSlotLabel(activeSlot) : '카드 선택').replace(/"/g,'&quot;')} 선택</span></div>`;
    if(typeof mode!=='undefined' && mode==='shop' && typeof isShopColorlessSlot==='function'){
      prog += `<div class="slot-hint">${isShopColorlessSlot(activeSlot)?'이 슬롯은 구매 가능한 중립 카드만 검색됩니다.':'이 슬롯은 현재 클래스 카드만 검색됩니다.'}</div>`;
    }
    return prog;
  }

  function ensureChrome(){
    if(typeof window.renderSearchScopeTabs === 'function') window.renderSearchScopeTabs();
    const wrap = document.getElementById('searchGridWrap');
    if(!wrap) return;
    if(typeof deckAddMode !== 'undefined' && !deckAddMode && !wrap.querySelector('.slot-progress')){
      const first = wrap.firstChild;
      const holder = document.createElement('div');
      holder.innerHTML = buildProgressHtml();
      while(holder.firstChild){ wrap.insertBefore(holder.firstChild, first); }
    }
  }

  function guarded(fn){
    if(typeof fn !== 'function') return fn;
    if(fn.__pickGuardWrapped) return fn;
    const wrapped = function(){
      if(pickBusy) return;
      pickBusy = true;
      try { return fn.apply(this, arguments); }
      finally { setTimeout(()=>{ pickBusy = false; }, 0); }
    };
    wrapped.__pickGuardWrapped = true;
    return wrapped;
  }

  function wrapPickActions(){
    if(Array.isArray(window.searchResultAction)){
      window.searchResultAction = window.searchResultAction.map(guarded);
      if(typeof searchResultAction !== 'undefined') searchResultAction = window.searchResultAction;
    }
    document.querySelectorAll('#searchGridWrap .sg-card').forEach((el, idx)=>{
      const fn = Array.isArray(window.searchResultAction) ? window.searchResultAction[idx] : null;
      if(fn) el.onclick = fn;
    });
  }

  window.renderSearchGrid = function(){
    if(typeof oldRender === 'function') oldRender.apply(this, arguments);
    ensureChrome();
    wrapPickActions();
  };

  window.openSearch = function(){
    if(typeof oldOpenSearch === 'function') oldOpenSearch.apply(this, arguments);
    ensureChrome();
    wrapPickActions();
  };

  window.openDeckAdd = function(){
    if(typeof oldOpenDeckAdd === 'function') oldOpenDeckAdd.apply(this, arguments);
    ensureChrome();
    wrapPickActions();
  };
})();
</script>


<script id="search-modal-digit-authoritative-fix-20260411">
(function(){
  function isSearchOpen(){
    const modal = document.getElementById('searchModal');
    return !!(modal && modal.classList.contains('open'));
  }
  function isTypingInSearch(){
    const el = document.activeElement;
    const input = document.getElementById('modalInput');
    return !!(input && el === input);
  }
  function pickRenderedCard(idx){
    const cards = Array.from(document.querySelectorAll('#searchGridWrap .sg-card'));
    const el = cards[idx];
    if(!el) return false;
    el.click();
    return true;
  }
  document.addEventListener('keydown', function(e){
    if(e.ctrlKey || e.metaKey || e.altKey) return;
    if(e.isComposing) return;
    if(!isSearchOpen()) return;
    const key = e.code && /^Digit[1-9]$/.test(e.code) ? e.code.replace('Digit','') : (e.code && /^Numpad[1-9]$/.test(e.code) ? e.code.replace('Numpad','') : (String(e.key||'').match(/^[1-9]$/) ? String(e.key) : ''));
    if(!key) return;
    const idx = Number(key) - 1;
    const cards = document.querySelectorAll('#searchGridWrap .sg-card');
    if(idx < 0 || idx >= cards.length) return;
    e.preventDefault();
    e.stopPropagation();
    if(typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
    pickRenderedCard(idx);
  }, true);
})();
</script>

<script id="search-flow-stable-v4-20260414">

      try{ const isDeckAdd = this.state.type === 'deckAdd'; window.deckAddMode = isDeckAdd; deckAddMode = isDeckAdd; }catch(e){}
      window.searchScope = this.state.scope;
    },

    isDeckAdd(){ return this.state.type === 'deckAdd'; },
    isShop(){ return (typeof mode !== 'undefined' && mode === 'shop'); },
    isColorlessOnlySlot(slotIndex=this.state.slotIndex){
      return !this.isDeckAdd() && this.isShop() && typeof isShopColorlessSlot === 'function' && isShopColorlessSlot(slotIndex);
    },

    getScopeConfig(){
      const current = (typeof curChar !== 'undefined' && curChar) ? curChar : 'ironclad';
      const CDN = 'https://cdn.jsdelivr.net/gh/elithelucky/sts2-images@latest/';
      const labels = {
        ironclad:'아이언클래드',
        silent:'사일런트',
        defect:'디펙트',
        necro:'네크로바인더',
        regent:'리젠트'
      };
      const icons = {
        ironclad: CDN + 'profile_Ironclad.webp',
        silent: CDN + 'profile_Silent.webp',
        defect: CDN + 'profile_Defect.webp',
        necro: CDN + 'profile_Necrobinder.webp',
        regent: CDN + 'profile_Regent.webp'
      };
      return [
        {key:'all', label:'전체', icon:'', hotkey:'ALT+1'},
        {key:'current', label:labels[current] || '현재 클래스', icon:icons[current] || '', hotkey:'ALT+2'},
        {key:'colorless', label:'중립', icon:'', hotkey:'ALT+3'},
        {key:'other', label:'다른 직업', icon:'', hotkey:'ALT+4'}
      ];
    },

    resetScope(){
      if(this.isDeckAdd()){
        this.state.scope = 'all';
      } else if(this.isColorlessOnlySlot()){
        this.state.scope = 'colorless';
      } else {
        this.state.scope = 'current';
      }
      this.syncToGlobals();
    },

    openReward(slotIndex){
      this.state.type = 'reward';
      this.state.slotIndex = Number(slotIndex);
      this.resetScope();
      this.openModal((typeof getSlotLabel === 'function' ? getSlotLabel(this.state.slotIndex) : '카드') + ' 선택');
    },

    openDeckAdd(){
      this.state.type = 'deckAdd';
      this.state.slotIndex = -1;
      this.resetScope();
      this.openModal('덱에 카드 추가');
    },

    close(){
      const modal = document.getElementById(modalId);
      if(modal) modal.classList.remove('open');
      this.state.slotIndex = -1;
      this.state.type = 'reward';
      this.syncToGlobals();
      if(typeof updateBodyLock === 'function') updateBodyLock();
    },

    openModal(title){
      const modal = document.getElementById(modalId);
      const input = document.getElementById(inputId);
      const titleEl = document.getElementById(titleId);
      if(titleEl) titleEl.textContent = title;
      if(input) input.value = '';
      if(modal) modal.classList.add('open');
      this.syncToGlobals();
      if(typeof updateBodyLock === 'function') updateBodyLock();
      this.renderScopeTabs();
      this.render();
      if(typeof ensureSearchInputFocus === 'function') ensureSearchInputFocus();
    },

    getPoolByScope(scope){
      const current = (typeof curChar !== 'undefined' && curChar) ? curChar : 'ironclad';
      if(typeof REPO_POOLS !== 'undefined' && REPO_POOLS){
        const classOrder = (typeof CLASS_ORDER !== 'undefined' && Array.isArray(CLASS_ORDER)) ? CLASS_ORDER : ['ironclad','silent','defect','necro','regent'];
        if(scope === 'current') return (REPO_POOLS[current] || []).slice();
        if(scope === 'colorless') return (REPO_POOLS.colorless || []).slice();
        if(scope === 'other') return classOrder.filter(k => k !== current).flatMap(k => REPO_POOLS[k] || []);
        return classOrder.flatMap(k => REPO_POOLS[k] || []).concat((REPO_POOLS.colorless || []).slice());
      }

      const classCards = (typeof ALL !== 'undefined' && ALL[current] && Array.isArray(ALL[current].cards)) ? ALL[current].cards.slice() : [];
      const colorless = (typeof COLORLESS_CARDS !== 'undefined' && Array.isArray(COLORLESS_CARDS)) ? COLORLESS_CARDS.slice() : [];
      const classOrder = (typeof ALL !== 'undefined' && ALL) ? Object.keys(ALL) : [];
      if(scope === 'current') return classCards;
      if(scope === 'colorless') return colorless;
      if(scope === 'other') return classOrder.filter(k => k !== current).flatMap(k => (ALL[k] && Array.isArray(ALL[k].cards)) ? ALL[k].cards : []);
      return classOrder.flatMap(k => (ALL[k] && Array.isArray(ALL[k].cards)) ? ALL[k].cards : []).concat(colorless);
    },

    getBasePool(){
      if(this.isColorlessOnlySlot()) {
        this.state.scope = 'colorless';
        this.syncToGlobals();
      }
      let pool = this.getPoolByScope(this.state.scope);
      const seen = new Set();
      pool = pool.filter(card => {
        if(!card || !card.n) return false;
        if(!this.isDeckAdd() && typeof isStatusOrCurseCard === 'function' && isStatusOrCurseCard(card)) return false;
        if(this.isColorlessOnlySlot() && typeof isPurchasableColorlessCard === 'function' && !isPurchasableColorlessCard(card)) return false;
        if(typeof shouldIncludeInCurrentContext === 'function' && !shouldIncludeInCurrentContext(card)) return false;
        const key = String((card && (card.filename || card.n)) || '').replace(/\s+/g,'').toLowerCase();
        if(seen.has(key)) return false;
        seen.add(key);
        return true;
      });
      return pool;
    },

    getFilteredList(){
      const input = document.getElementById(inputId);
      const q = input ? String(input.value || '') : '';
      let pool = this.getBasePool();
      if(!this.isDeckAdd()){
        const ex = Array.isArray(window.picks) ? window.picks.filter((p, idx) => p && idx !== this.state.slotIndex) : ((typeof picks !== 'undefined' && Array.isArray(picks)) ? picks.filter((p, idx) => p && idx !== this.state.slotIndex) : []);
        pool = pool.filter(card => !ex.includes(card.n));
      }
      return pool
        .map(card => ({ card, rank: (typeof getSearchRank === 'function' ? getSearchRank(card.n, q) : 0) }))
        .filter(x => x.rank > -1)
        .sort((a, b) => (b.rank - a.rank) || ((a.card.n || '').length - (b.card.n || '').length) || String(a.card.n || '').localeCompare(String(b.card.n || ''), 'ko'))
        .map(x => x.card);
    },

    buildProgressHtml(){
      if(this.isDeckAdd() || typeof getNeedCount !== 'function') return '';
      const need = getNeedCount();
      if(!need) return '';
      let prog = '<div class="slot-progress">' + Array.from({length:need}, (_,i) => {
        const on = i === this.state.slotIndex ? ' on' : '';
        const colorless = this.isShop() && this.isColorlessOnlySlot(i) ? ' colorless' : '';
        return `<span class="slot-dot${on}${colorless}"></span>`;
      }).join('') + `<span class="slot-text">${(typeof getSlotLabel === 'function' ? getSlotLabel(this.state.slotIndex) : '카드 선택')} 선택</span></div>`;
      if(this.isShop()) {
        prog += `<div class="slot-hint">${this.isColorlessOnlySlot() ? '이 슬롯은 구매 가능한 중립 카드만 검색됩니다.' : '이 슬롯은 현재 클래스 카드만 검색됩니다.'}</div>`;
      }
      return prog;
    },

    makeCardImage(card){
      try{
        if(typeof makeImg === 'function'){
          const owner = String(card.__owner || card.owner || '').toLowerCase();
          const preferred = owner || ((typeof curChar !== 'undefined' && curChar) ? curChar : 'ironclad');
          const img = makeImg(card.n, 'sg', preferred);
          if(img) return img;
        }
      }catch(e){}
      const img = document.createElement('img');
      img.loading = 'lazy';
      img.decoding = 'async';
      img.src = 'https://cdn.jsdelivr.net/gh/elithelucky/sts2-images@latest/' + (card.filename || (encodeURIComponent(String(card.n||'').replace(/\s+/g,'')) + '.webp'));
      img.className = 'img-loading';
      img.onload = () => img.classList.remove('img-loading');
      img.onerror = () => {
        img.onerror = null;
        const ph = document.createElement('div');
        ph.className = 'sg-ph';
        ph.textContent = card.n || '';
        img.replaceWith(ph);
      };
      return img;
    },

    renderScopeTabs(){
      const top = document.querySelector('#' + modalId + ' .modal-top');
      if(!top) return;
      let box = document.getElementById('searchScopeTabs');
      if(!box){
        box = document.createElement('div');
        box.id = 'searchScopeTabs';
        box.className = 'search-scope-tabs';
        top.appendChild(box);
      }
      const forceColorless = this.isColorlessOnlySlot();
      if(forceColorless && this.state.scope !== 'colorless'){
        this.state.scope = 'colorless';
        this.syncToGlobals();
      }
      box.innerHTML = '';
      this.getScopeConfig().forEach(item => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'search-scope-chip' + (this.state.scope === item.key ? ' on' : '');
        btn.disabled = forceColorless && item.key !== 'colorless';
        btn.style.opacity = btn.disabled ? '.55' : '1';
        btn.onclick = () => {
          if(btn.disabled) return;
          this.state.scope = item.key;
          this.syncToGlobals();
          this.render();
        };
        if(item.icon){
          const icon = document.createElement('img');
          icon.src = item.icon;
          icon.onerror = () => icon.remove();
          btn.appendChild(icon);
        }
        const label = document.createElement('span');
        label.textContent = item.label;
        btn.appendChild(label);
        const keycap = document.createElement('span');
        keycap.className = 'search-scope-keycap';
        keycap.textContent = item.hotkey;
        btn.appendChild(keycap);
        box.appendChild(btn);
      });
    },

    render(){
      const wrap = document.getElementById(wrapId);
      if(!wrap) return;
      const list = this.getFilteredList();
      const progressHtml = this.buildProgressHtml();
      this.renderScopeTabs();
      window.searchResultList = list.slice();
      try{ searchResultList = list.slice(); }catch(e){}
      window.searchResultAction = [];
      try{ searchResultAction = []; }catch(e){}
      wrap.innerHTML = progressHtml;
      if(!list.length){
        wrap.innerHTML = progressHtml + '<div class="search-empty">결과 없음</div>';
        return;
      }
      const grid = document.createElement('div');
      grid.className = 'search-grid';
      const input = document.getElementById(inputId);
      const q = input ? String(input.value || '') : '';
      list.forEach((card, idx) => {
        const el = document.createElement('div');
        el.className = 'sg-card';
        const choose = () => this.pick(card, idx);
        el.onclick = choose;
        window.searchResultAction[idx] = choose;
        try{ searchResultAction[idx] = choose; }catch(e){}
        el.appendChild(this.makeCardImage(card));
        if(window.innerWidth > 768 && idx < 9){
          const kc = document.createElement('span');
          kc.className = 'search-keycap';
          kc.textContent = String(idx + 1);
          el.appendChild(kc);
        }
        el.insertAdjacentHTML('beforeend', `<div class="sg-name">${card.n || ''}</div><span class="sg-tier tier-${card.tier || 'C'}">${card.tier || 'C'}</span>`);
        grid.appendChild(el);
      });
      wrap.appendChild(grid);
    },

    pick(card){
      if(window.__searchFlowPickLock) return;
      window.__searchFlowPickLock = true;
      const release = () => setTimeout(() => { window.__searchFlowPickLock = false; }, 0);
      try{
        // Clear search input on card selection to prevent leftover characters. Do this both immediately and after a microtask
        try {
          const __input__ = document.getElementById('modalInput');
          if(__input__){
            __input__.value = '';
            if(typeof __input__.__searchQuery === 'string') __input__.__searchQuery = '';
          }
        } catch(__err__2){ }
        // Schedule a second clear on the next event loop tick to override any asynchronous updates (e.g. from composition or delayed renders)
        setTimeout(() => {
          try {
            const __input2__ = document.getElementById('modalInput');
            if(__input2__){
              __input2__.value = '';
              if(typeof __input2__.__searchQuery === 'string') __input2__.__searchQuery = '';
            }
          } catch(__e__){ /* no-op */ }
        }, 0);
        if(this.isDeckAdd()){
          if(typeof pushDeckCard === 'function') pushDeckCard(card.n);
          else if(Array.isArray(window.deck)) window.deck.push(card.n);
          this.close();
          if(typeof renderAll === 'function') renderAll();
          return;
        }
        if(Array.isArray(window.picks)) window.picks[this.state.slotIndex] = card.n;
        else if(typeof picks !== 'undefined' && Array.isArray(picks)) picks[this.state.slotIndex] = card.n;

        const need = (typeof getNeedCount === 'function') ? getNeedCount() : 0;
        const currentPicks = Array.isArray(window.picks) ? window.picks : ((typeof picks !== 'undefined' && Array.isArray(picks)) ? picks : []);
        const next = Array.from({length:need}, (_,i) => i).find(i => !currentPicks[i]);

        if(next !== undefined){
          this.state.slotIndex = next;
          this.syncToGlobals();
          const titleEl = document.getElementById(titleId);
          if(titleEl) titleEl.textContent = ((typeof getSlotLabel === 'function') ? getSlotLabel(next) : '카드') + ' 선택';
          const input = document.getElementById(inputId);
          if(input) input.value = '';
          if(typeof renderRewardRow === 'function') renderRewardRow();
          this.render();
          if(typeof ensureSearchInputFocus === 'function') ensureSearchInputFocus();
        } else {
          this.close();
          if(typeof renderAll === 'function') renderAll('to-result');
        }
      } finally {
        release();
      }
    },

    bindInput(){
      const input = document.getElementById(inputId);
      if(!input || input.__searchFlowRefactorBound) return;
      input.__searchFlowRefactorBound = true;
      input.addEventListener('compositionstart', () => { input.__isComposingSearch = true; }, true);
      input.addEventListener('compositionupdate', () => { this.render(); }, true);
      input.addEventListener('compositionend', () => { input.__isComposingSearch = false; this.render(); }, true);
      input.oninput = () => this.render();
    },

    bindKeys(){
      if(window.__searchFlowKeyBound) return;
      window.__searchFlowKeyBound = true;
      document.addEventListener('keydown', (e) => {
        const modal = document.getElementById(modalId);
        if(!modal || !modal.classList.contains('open')) return;
        if(e.altKey){
          const nextScope = ({'1':'all','2':'current','3':'colorless','4':'other'})[e.key];
          if(nextScope){
            e.preventDefault();
            e.stopPropagation();
            if(typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
            if(this.isColorlessOnlySlot() && nextScope !== 'colorless') return;
            this.state.scope = nextScope;
            this.syncToGlobals();
            this.render();
            return;
          }
        }
        const key = e.code && /^Digit[1-9]$/.test(e.code) ? e.code.replace('Digit','') : (e.code && /^Numpad[1-9]$/.test(e.code) ? e.code.replace('Numpad','') : (/^[1-9]$/.test(String(e.key || '')) ? String(e.key) : ''));
        // ignore digit shortcuts when Alt is held or other modifiers are pressed
        if(!key || e.ctrlKey || e.metaKey || e.altKey) return;
        e.preventDefault();
        e.stopPropagation();
        if(typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
        const idx = Number(key) - 1;
        const fn = (window.searchResultAction || [])[idx];
        if(!fn) return;
        fn();
      }, true);
    },

    init(){
      this.syncToGlobals();
      this.bindInput();
      this.bindKeys();
    }
  };

  SearchFlow.init();
  window.__searchFlow = SearchFlow;
  window.openSearch = function(i){ SearchFlow.openReward(i); };
  window.openDeckAdd = function(){ SearchFlow.openDeckAdd(); };
  window.closeSearch = function(){ SearchFlow.close(); };
  window.renderSearchGrid = function(){ SearchFlow.render(); };
  window.pickSearchCard = function(card){ SearchFlow.pick(card); };
})();

<!-- final-search-fix-20260423: unify romanization, input stability, and clearing search on pick -->
<script id="final-search-fix-20260423">
(() => {
  // mapping from QWERTY keys to Hangul jamo for Dubeolsik keyboard
  const keyMap = {
    q:'ㅂ', w:'ㅈ', e:'ㄷ', r:'ㄱ', t:'ㅅ', y:'ㅛ', u:'ㅕ', i:'ㅑ', o:'ㅐ', p:'ㅔ',
    a:'ㅁ', s:'ㄴ', d:'ㅇ', f:'ㄹ', g:'ㅎ', h:'ㅗ', j:'ㅓ', k:'ㅏ', l:'ㅣ',
    z:'ㅋ', x:'ㅌ', c:'ㅊ', v:'ㅍ', b:'ㅠ', n:'ㅜ', m:'ㅡ'
  };
  function romanToHangul(str){
    return Array.from(String(str||''))
      .map(ch => {
        const lower = ch.toLowerCase();
        return keyMap[lower] || ch;
      })
      .join('');
  }
  // wrap getSearchRank to consider romanized input; preserve existing ranking logic
  const origGetSearchRank = window.getSearchRank;
  if(typeof origGetSearchRank === 'function'){
    window.getSearchRank = function(name, q){
      let rank = origGetSearchRank(name, q);
      const conv = romanToHangul(q);
      if(conv && conv !== q){
        const r2 = origGetSearchRank(name, conv);
        if(r2 > rank) rank = r2;
      }
      return rank;
    };
  }
  // wrap getSearchRankFinal similarly
  const origFinalRank = window.getSearchRankFinal;
  if(typeof origFinalRank === 'function'){
    window.getSearchRankFinal = function(name, q){
      let rank = origFinalRank(name, q);
      const conv = romanToHangul(q);
      if(conv && conv !== q){
        const r2 = origFinalRank(name, conv);
        if(r2 > rank) rank = r2;
      }
      return rank;
    };
  }
  // ensure search input and internal query buffer are cleared when a card is picked.
  if(typeof window.pickSearchCard === 'function'){
    const origPick = window.pickSearchCard;
    window.pickSearchCard = function(card, idx){
      try {
        const input = document.getElementById('modalInput');
        if(input){
          input.value = '';
          if(typeof input.__searchQuery === 'string') input.__searchQuery = '';
        }
      } catch(e){}
      // schedule a secondary clear to handle any asynchronous updates from other handlers
      setTimeout(() => {
        try {
          const input2 = document.getElementById('modalInput');
          if(input2){
            input2.value = '';
            if(typeof input2.__searchQuery === 'string') input2.__searchQuery = '';
          }
        } catch(_){/*ignore*/}
      }, 0);
      return origPick.call(this, card, idx);
    };
  }
  // block Alt+key and digit hotkeys inside the search input to prevent accidental scope changes or card picks
  function attachStabilityListeners(el){
    if(!el || el.__finalFixBound) return;
    el.__finalFixBound = true;
    el.addEventListener('keydown', (e) => {
      // Prevent Alt+number combinations in the search input from changing the scope while typing.
      if(e.altKey){
        e.stopPropagation();
        if(typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
        return;
      }
      // Do not block plain number keys; aggregator ignores digits and allows them to propagate so the
      // global key handler can select cards via number shortcuts.
    }, true);
  }
  document.addEventListener('focusin', (ev) => {
    const tgt = ev.target;
    if(tgt && tgt.id === 'modalInput'){
      attachStabilityListeners(tgt);
    }
  }, true);
})();
</script>



<!-- IME leftover fix 20260419 v5 - wrap pickSearchCard + input event guard -->
<!--
  디버그 로그로 확인된 실제 원인 (기존 v1~v4 추측은 모두 틀렸음):

    [5591.6ms] SET:value "ㅍㅁㅌ" -> ""  @ pickSearchCard
    [5612.6ms] EVT:input  value="ㅌ"                  <- 21ms 후 IME가 "ㅌ" 덮어씀
    [5679.6ms] EVT:keyup  key="Process" code=Digit1
    [5680.6ms] EVT:keyup  key="1"       code=Digit1

    1) 사용자가 "1"을 누르는 시점에 ㅌ은 IME 조합 중(isComposing=true)
    2) Digit1 keydown은 IME가 먹어서 발생하지 않음 -> 기존 keydown 기반 패치가
       트리거조차 안 됨 (v1~v4 실패 원인)
    3) 하지만 SearchFlow.bindKeys 내부에서 어떤 경로로 pickSearchCard는 호출됨
    4) pickSearchCard가 value="" 세팅
    5) 그 직후 브라우저 IME가 조합 중이던 "ㅌ"을 input 이벤트로 주입
       -> input.value = "ㅌ"

  해결: pickSearchCard를 래핑하여 호출 직후 ~300ms 동안 input 이벤트 감시,
        그 동안 value가 채워지면 즉시 비운다.

  사이드이펙트 없음:
    - pick 호출 시에만 가드 활성화, 그 외엔 원본과 동일
    - 300ms 가드 종료 후 사용자 입력은 정상 동작
    - 기존 코드는 한 줄도 수정하지 않음, 래핑만 함
-->
<script id="ime-leftover-fix-20260419-v5">
(function(){
  const GUARD_MS = 300;
  let guardUntil = 0;

  function inGuard(){ return performance.now() < guardUntil; }

  function forceClearInput(input){
    if(!input) return;
    // native setter로 직접 세팅 (value setter가 다른 코드에서 가로채져 있어도 확실히 동작)
    try {
      const desc = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value');
      if(desc && desc.set) desc.set.call(input, '');
      else input.value = '';
    } catch(_){ input.value = ''; }
    if(typeof input.__searchQuery === 'string') input.__searchQuery = '';
    input.__isComposingSearch = false;
  }

  // modalInput에 input 이벤트 가드 리스너 부착
  function attachInputGuard(){
    const input = document.getElementById('modalInput');
    if(!input || input.__v5GuardBound) return;
    input.__v5GuardBound = true;

    // capture 단계에서 최우선으로 실행. 가드 중이면 입력된 값을 즉시 0으로.
    // 다른 input 리스너들(renderSearchGrid 트리거 등)보다 먼저 실행되어
    // 빈 값으로 render되도록 함.
    input.addEventListener('input', function(e){
      if(!inGuard()) return;
      if(input.value === '') return;
      forceClearInput(input);
      // 이 input 이벤트는 이미 발생한 것이라 stopPropagation해도 다른 리스너는 돌 수 있음.
      // 하지만 그들이 보는 값은 이미 ""로 바뀌어 있으므로 OK.
    }, true);

    // compositionend로 IME가 뒤늦게 커밋하는 경우도 동일하게
    input.addEventListener('compositionend', function(e){
      if(!inGuard()) return;
      // compositionend 직후 브라우저가 value를 업데이트하므로 다음 tick에 비우기
      setTimeout(function(){
        if(inGuard()) forceClearInput(input);
      }, 0);
      requestAnimationFrame(function(){
        if(inGuard()) forceClearInput(input);
      });
    }, true);
  }

  // pickSearchCard와 selectSearchResultByIndex를 래핑
  // 이 둘 중 하나가 호출되면 가드 활성화
  function activateGuard(reason){
    guardUntil = performance.now() + GUARD_MS;
    const input = document.getElementById('modalInput');
    if(input){
      // 현재 값도 바로 비우기 (조합 중 ㅌ이 이미 들어와 있을 수도 있음)
      forceClearInput(input);
      // 가드 기간 동안 여러 타이밍에 반복 청소
      [0, 16, 50, 100, 180, 260].forEach(function(delay){
        setTimeout(function(){
          if(!inGuard()) return;
          const cur = document.getElementById('modalInput');
          if(cur && cur.value !== '') forceClearInput(cur);
        }, delay);
      });
    }
  }

  function wrapFn(name){
    let current = window[name];
    Object.defineProperty(window, name, {
      configurable: true,
      get(){ return current; },
      set(fn){
        // 원본을 래핑하는 형태로 저장
        current = function(){
          activateGuard(name);
          const ret = fn.apply(this, arguments);
          // 호출 후에도 가드 재활성화 (비동기 동작이 있을 수 있으므로)
          activateGuard(name + ':post');
          return ret;
        };
      }
    });
    // 이미 정의되어 있으면 즉시 래핑
    if(typeof current === 'function'){
      const orig = current;
      current = function(){
        activateGuard(name);
        const ret = orig.apply(this, arguments);
        activateGuard(name + ':post');
        return ret;
      };
    }
  }

  function init(){
    attachInputGuard();
    wrapFn('pickSearchCard');
    // selectSearchResultByIndex도 래핑 (모바일/다른 경로 대비)
    wrapFn('selectSearchResultByIndex');
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
  // modalInput이 재생성되는 경우 대비
  document.addEventListener('focusin', function(ev){
    if(ev.target && ev.target.id === 'modalInput') attachInputGuard();
  }, true);
})();
</script>

<!-- IME 중복 바인딩 제거 + 카드2 블록 픽스 v6 -->
<!--
  증상:
  1) 한글 입력시 ㅁ 치면 ㅁㅁ 나옴 (이중 입력)
  2) 지울 때 한글자가 아니라 전체가 지워짐
  3) 두 번째 카드 보상 선택시 "카드 2 선택"에서 안 넘어감
  4) 영어로 검색하면 증상 사라짐 (한글 IME 특정)

  원인:
  - modalInput 요소에 compositionstart/update/end 이벤트가 3~4군데에서 중복 바인딩됨:
    · SearchFlowStable.bindInput (line ~6268)
    · bindCompositionGuards (line ~6484)
    · 전역 IME listener (line ~6811)
    · SearchFlowRefactor.bindInput (line ~7202)
  - 각자 다른 guard flag (__searchFlowStableBound, __searchComposeBound,
    __searchFlowRefactorBound)를 써서 서로를 막지 못함
  - 한 번의 한글 입력마다 renderSearchGrid가 2~4번 호출 → 중복 표시

  수정:
  - modalInput을 발견하면 replaceWith(cloneNode)로 모든 기존 리스너 제거
  - 단일 IME 이벤트 핸들러만 재등록
  - input 이벤트도 단일 oninput 핸들러로 통합
  - 디버그 로그 on/off 토글 (window.__imeDebug = true로 켜기)

  카드2 선택 블록 원인 추정:
  - 첫 카드 pick시 v5 가드가 활성화 → forceClear
  - forceClear가 composition 중인 IME를 망가뜨려 두 번째 입력에서 input 이벤트 자체가 안 발동
  - v6에서 modalInput 자체를 replace하면 state가 완전히 리셋되므로 두 번째도 정상 동작
-->
<script id="ime-dedup-fix-20260419-v6">
(function(){
  const DEBUG_KEY = '__imeDebug';
  function dbg(...args){
    if(window[DEBUG_KEY]) console.log('[IME-v6]', ...args);
  }

  // modalInput을 깨끗한 상태로 리셋
  // 기존 compositionstart/compositionend/compositionupdate/input 리스너 모두 제거
  function resetInputElement(){
    const input = document.getElementById('modalInput');
    if(!input) return null;
    if(input.__v6Reset) return input;

    dbg('resetting modalInput, removing duplicate IME listeners');

    // 기존 이벤트 리스너 제거 방법: cloneNode(true) 후 replaceWith
    // React/Vue 같은 프레임워크 안 쓰므로 안전
    const clone = input.cloneNode(true);
    clone.__v6Reset = true;
    // 기존 __isComposingSearch 상태 계승
    clone.__isComposingSearch = false;
    clone.__searchQuery = '';

    input.parentNode.replaceChild(clone, input);

    // 다른 코드들이 설정한 bound flag 제거 (cloneNode는 제거하지만 확실히)
    delete clone.__searchFlowStableBound;
    delete clone.__searchComposeBound;
    delete clone.__searchFlowRefactorBound;
    delete clone.__v5GuardBound;

    // 단일 composition 이벤트 핸들러
    clone.addEventListener('compositionstart', function(){
      clone.__isComposingSearch = true;
      dbg('compositionstart');
    }, true);

    clone.addEventListener('compositionupdate', function(e){
      dbg('compositionupdate', 'data=', e.data, 'value=', clone.value);
      if(typeof window.renderSearchGrid === 'function') window.renderSearchGrid();
    }, true);

    clone.addEventListener('compositionend', function(e){
      clone.__isComposingSearch = false;
      dbg('compositionend', 'data=', e.data, 'value=', clone.value);
      if(typeof window.renderSearchGrid === 'function') window.renderSearchGrid();
    }, true);

    // 단일 input 핸들러
    clone.addEventListener('input', function(e){
      dbg('input', 'value=', clone.value, 'isComposing=', e.isComposing);
      if(typeof window.renderSearchGrid === 'function') window.renderSearchGrid();
    });

    // v5 가드 리스너도 여기서 다시 부착
    // (v5의 attachInputGuard가 focusin으로 자동 재부착되므로 생략 가능하지만 안전하게)

    return clone;
  }

  // 모달이 열릴 때마다 input 리셋
  function setupResetOnModalOpen(){
    const modal = document.getElementById('searchModal') || document.getElementById('modal');
    if(!modal) return;

    // MutationObserver로 modal의 open 클래스 변화 감지
    const observer = new MutationObserver(function(mutations){
      for(const m of mutations){
        if(m.type === 'attributes' && m.attributeName === 'class'){
          if(modal.classList.contains('open')){
            dbg('modal opened, resetting input');
            // 다음 tick에 리셋 (focus 타이밍 이후)
            setTimeout(resetInputElement, 0);
          }
        }
      }
    });

    observer.observe(modal, { attributes: true, attributeFilter: ['class'] });
  }

  // pickSearchCard 호출 후에도 input 리셋
  function wrapPickAfterReset(){
    const origPick = window.pickSearchCard;
    if(typeof origPick !== 'function' || origPick.__v6Wrapped) return;

    window.pickSearchCard = function(){
      const ret = origPick.apply(this, arguments);
      // 카드 pick 후 다음 검색을 위해 input을 강제 리셋
      // v5 forceClear 다음에 추가로 새로운 input 요소로 replace
      setTimeout(function(){
        dbg('post-pick reset');
        resetInputElement();
      }, 320); // v5 가드(300ms)가 끝난 직후
      return ret;
    };
    window.pickSearchCard.__v6Wrapped = true;
  }

  function init(){
    resetInputElement();
    setupResetOnModalOpen();
    wrapPickAfterReset();

    // focusin으로 input 리셋 보장
    document.addEventListener('focusin', function(ev){
      if(ev.target && ev.target.id === 'modalInput' && !ev.target.__v6Reset){
        dbg('focusin on non-reset input');
        resetInputElement();
      }
    }, true);

    dbg('v6 initialized. toggle debug with: window.__imeDebug = true');
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

<!-- 카드 선택 직후 키 입력 차단 + 디버그 오버레이 v7 -->
<!--
  증상:
  - ㅍㅁㅌㄱ 입력 → 1 눌러 폼멜타격이 카드1에 선택됨
  - 카드2 선택 화면으로 넘어감
  - 여기서 1 눌렀더니 카드1의 폼멜타격이 덮어써짐 (또는 그렇게 느껴짐)

  가능한 원인:
  1. pickSearchCard → activeSlot 변경 → renderSearchGrid 호출 사이에 race condition
  2. 사용자가 카드1 선택 후 연속으로 누른 두 번째 1이 이전 DOM 기준 이벤트로 처리
  3. searchResultAction 배열이 여러 keydown 리스너에 공유되어 타이밍 문제

  수정:
  - pickSearchCard 직후 150ms 동안 숫자 키 입력 무시 (race 방지)
  - 화면 우하단에 디버그 오버레이 추가 (activeSlot, picks, 마지막 키, searchResultAction 길이 등)
  - window.__uiDebug = true 설정 시 오버레이 표시
-->
<script id="pick-keyblock-debug-20260419-v7">
(function(){
  // ========== 카드 선택 후 키 블록 ==========
  const BLOCK_MS = 150;
  let blockUntil = 0;

  function inBlock(){ return performance.now() < blockUntil; }

  // pickSearchCard를 래핑해서 직후 150ms 숫자키 입력 차단
  function wrapPickForBlock(){
    const orig = window.pickSearchCard;
    if(typeof orig !== 'function' || orig.__v7Wrapped) return;
    window.pickSearchCard = function(){
      const ret = orig.apply(this, arguments);
      blockUntil = performance.now() + BLOCK_MS;
      if(window.__uiDebug) logDebug('pick executed, blocking keys for ' + BLOCK_MS + 'ms');
      return ret;
    };
    window.pickSearchCard.__v7Wrapped = true;
  }

  // 숫자키 입력을 capture 단계에서 먼저 가로챔
  // blockUntil 이내면 event.stopImmediatePropagation
  document.addEventListener('keydown', function(e){
    if(!inBlock()) return;
    if(!/^[1-9]$/.test(String(e.key || ''))) return;
    // 숫자키인데 block 기간이면 차단
    e.preventDefault();
    e.stopPropagation();
    if(typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
    if(window.__uiDebug) logDebug('BLOCKED key ' + e.key + ' (within ' + Math.round(BLOCK_MS - (blockUntil - performance.now())) + 'ms of pick)');
  }, true); // capture 단계 — 다른 keydown보다 먼저

  // ========== 디버그 오버레이 ==========
  let overlay = null;
  let logLines = [];
  const MAX_LOG = 15;

  function createOverlay(){
    if(overlay) return overlay;
    overlay = document.createElement('div');
    overlay.id = '__uiDebugOverlay';
    overlay.style.cssText = 'position:fixed;bottom:8px;right:8px;background:rgba(0,0,0,0.85);color:#0f0;font:11px/1.4 monospace;padding:8px;max-width:380px;max-height:300px;overflow:auto;z-index:99999;border-radius:4px;white-space:pre-wrap;word-break:break-all;pointer-events:auto;';
    overlay.innerHTML = '<b style="color:#ff0">UI Debug</b><br>';
    document.body.appendChild(overlay);
    return overlay;
  }

  function removeOverlay(){
    if(overlay && overlay.parentNode){
      overlay.parentNode.removeChild(overlay);
      overlay = null;
    }
  }

  function logDebug(msg){
    const time = new Date().toISOString().substr(14, 9);
    logLines.push('[' + time + '] ' + msg);
    if(logLines.length > MAX_LOG) logLines.shift();
    renderOverlay();
  }

  function renderOverlay(){
    if(!window.__uiDebug){ removeOverlay(); return; }
    const el = createOverlay();
    const state = [];
    state.push('activeSlot=' + window.activeSlot);
    state.push('picks=' + JSON.stringify(window.picks || []));
    const actLen = Array.isArray(window.searchResultAction) ? window.searchResultAction.length : 0;
    state.push('searchResultAction.length=' + actLen);
    const input = document.getElementById('modalInput');
    state.push('modalInput.value="' + (input ? input.value : 'null') + '"');
    state.push('modalInput.__isComposingSearch=' + (input && input.__isComposingSearch));
    state.push('blockUntil=' + (inBlock() ? 'YES(' + Math.round(blockUntil - performance.now()) + 'ms)' : 'no'));
    el.innerHTML = '<b style="color:#ff0">UI Debug</b> <span style="color:#f80;cursor:pointer" onclick="window.__uiDebug=false;">[close]</span><br>' +
      state.join('<br>') + '<br>---<br>' + logLines.join('<br>');
  }

  // 전역 이벤트 훅
  document.addEventListener('keydown', function(e){
    if(!window.__uiDebug) return;
    const key = e.key;
    if(/^[1-9]$/.test(key) || e.code === 'Backspace' || key === 'Backspace'){
      logDebug('keydown ' + key + ' (code=' + e.code + ', activeSlot=' + window.activeSlot + ')');
    }
  }, true);

  // picks 변경 감지 (proxy로 감싸면 기존 코드 깨질 수 있어서 주기적 폴링)
  let lastPicksSnapshot = '';
  setInterval(function(){
    if(!window.__uiDebug) return;
    const cur = JSON.stringify(window.picks || []);
    if(cur !== lastPicksSnapshot){
      logDebug('picks changed: ' + lastPicksSnapshot + ' -> ' + cur);
      lastPicksSnapshot = cur;
    }
    renderOverlay();
  }, 200);

  function init(){
    wrapPickForBlock();
    if(window.__uiDebug) renderOverlay();
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  // 외부에서 토글할 수 있게
  window.__uiDebugLog = logDebug;
  window.__uiDebugToggle = function(){
    window.__uiDebug = !window.__uiDebug;
    renderOverlay();
  };
})();
</script>

<!-- v8: SearchFlow.pick 직접 래핑 + 전역 pick 동기화 -->
<!--
  문제:
  - 카드1 선택 후 화면은 "카드 2 선택"으로 바뀌지만
  - 아래 progress dot은 여전히 카드1을 활성으로 표시
  - 이 상태에서 1/2/3 누르면 카드1이 덮어써짐
  - 즉 window.activeSlot은 1인데 SearchFlow.state.slotIndex는 0인 불일치 발생

  원인:
  - window.pickSearchCard가 7번 덮어써져 있음
  - choose 클로저마다 다른 경로로 pick 수행
  - SearchFlow.state와 window 전역 상태가 불일치

  수정:
  - window.__searchFlow 객체를 찾아서 pick 메서드를 직접 래핑
  - pick 실행 시 슬롯 상태를 강제 동기화
  - 키 입력 차단 기간을 350ms로 늘려 연속 입력 완전 차단
  - render 후에도 상태 재확인
-->
<script id="search-flow-pick-sync-v8">
(function(){
  function dbg(msg){ if(window.__uiDebug && window.__uiDebugLog) window.__uiDebugLog('[v8] ' + msg); }

  // SearchFlow 객체를 찾아서 pick 래핑
  function wrapSearchFlowPick(){
    const sf = window.__searchFlow;
    if(!sf || typeof sf.pick !== 'function' || sf.pick.__v8Wrapped) return false;

    const origPick = sf.pick.bind(sf);
    const origRender = sf.render ? sf.render.bind(sf) : null;

    sf.pick = function(card, idx){
      const before = {
        slotIndex: this.state && this.state.slotIndex,
        activeSlot: window.activeSlot,
        picks: JSON.stringify(window.picks || [])
      };
      dbg('pick CALLED card=' + (card && card.n) + ' slotBefore=' + before.slotIndex + ' activeBefore=' + before.activeSlot);

      // 핵심: pick 실행 전 slotIndex를 activeSlot과 강제 동기화
      // (외부에서 activeSlot을 바꿨을 수도 있음)
      if(typeof window.activeSlot === 'number' && this.state){
        if(this.state.slotIndex !== window.activeSlot){
          dbg('SYNC slotIndex ' + this.state.slotIndex + ' -> ' + window.activeSlot + ' (from activeSlot)');
          this.state.slotIndex = window.activeSlot;
        }
      }

      const ret = origPick.call(this, card, idx);

      const after = {
        slotIndex: this.state && this.state.slotIndex,
        activeSlot: window.activeSlot,
        picks: JSON.stringify(window.picks || [])
      };
      dbg('pick DONE slotAfter=' + after.slotIndex + ' activeAfter=' + after.activeSlot + ' picks=' + after.picks);

      // pick 후 강제 동기화 (render가 slotIndex 기반으로 dot 표시하므로)
      if(this.state && typeof this.state.slotIndex === 'number'){
        window.activeSlot = this.state.slotIndex;
        try{ activeSlot = this.state.slotIndex; }catch(e){}
      }

      // render 한번 더 강제 실행으로 progress UI 정합성 확보
      if(origRender){
        setTimeout(() => {
          try{ origRender(); }catch(e){ dbg('post-render error: ' + e.message); }
        }, 0);
      }

      return ret;
    };
    sf.pick.__v8Wrapped = true;

    // render도 래핑해서 검색 결과가 그려질 때마다 state 확인
    if(origRender && !sf.render.__v8Wrapped){
      sf.render = function(){
        const ret = origRender.apply(this, arguments);
        // render 후 searchResultAction 길이 로그
        const actLen = Array.isArray(window.searchResultAction) ? window.searchResultAction.length : 0;
        dbg('render DONE slotIndex=' + (this.state && this.state.slotIndex) + ' action.length=' + actLen);
        return ret;
      };
      sf.render.__v8Wrapped = true;
    }

    dbg('SearchFlow wrapped');
    return true;
  }

  // window.pickSearchCard 최종 래핑 — 모든 pick 경로를 캡처
  function wrapWindowPick(){
    const orig = window.pickSearchCard;
    if(typeof orig !== 'function' || orig.__v8FinalWrapped) return;

    window.pickSearchCard = function(card, idx){
      dbg('window.pickSearchCard called card=' + (card && card.n) + ' idx=' + idx + ' activeSlot=' + window.activeSlot);
      const ret = orig.apply(this, arguments);
      return ret;
    };
    Object.keys(orig).forEach(k => {
      try{ window.pickSearchCard[k] = orig[k]; }catch(e){}
    });
    window.pickSearchCard.__v8FinalWrapped = true;
  }

  // 키 블록 기간을 더 길게 (v7은 150ms, v8은 400ms로)
  let v8BlockUntil = 0;
  document.addEventListener('keydown', function(e){
    if(!/^[1-9]$/.test(String(e.key || ''))) return;
    if(performance.now() < v8BlockUntil){
      e.preventDefault();
      e.stopPropagation();
      if(typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
      dbg('BLOCKED key ' + e.key + ' by v8');
    }
  }, true);

  // pickSearchCard 호출시 블록 활성화
  const origPickForBlock = window.pickSearchCard;
  function installBlockWrapper(){
    const cur = window.pickSearchCard;
    if(typeof cur !== 'function' || cur.__v8BlockWrapped) return;
    const wrapped = function(){
      v8BlockUntil = performance.now() + 400;
      dbg('block activated until +400ms');
      return cur.apply(this, arguments);
    };
    Object.keys(cur).forEach(k => { try{ wrapped[k] = cur[k]; }catch(e){} });
    wrapped.__v8BlockWrapped = true;
    window.pickSearchCard = wrapped;
  }

  function init(){
    // SearchFlow 래핑을 여러 번 시도 (나중에 정의될 수 있음)
    let attempts = 0;
    const tryWrap = setInterval(() => {
      attempts++;
      if(wrapSearchFlowPick() || attempts > 20){
        clearInterval(tryWrap);
      }
    }, 100);

    wrapWindowPick();
    installBlockWrapper();

    dbg('v8 init done');
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

<!-- Card alias search 20260419 v2 + image cache buster -->

<script id="card-alias-search-20260419-v2">
(function(){
  // ========== [1] 카드 별칭 ==========
  // 카드명(공백/대소문자 무시) -> 별칭 리스트

<script id="search-digit-single-dispatch-20260420-v1">
(function(){
  const state = {
    lastEventStamp: null,
    dispatchLockUntil: 0,
    keyHeld: new Set()
  };
  function now(){ return (window.performance && typeof performance.now==='function') ? performance.now() : Date.now(); }
  function isModalOpen(){
    const modal = document.getElementById('searchModal');
    return !!(modal && modal.classList.contains('open'));
  }
  function digitFromEvent(e){
    if(!e) return '';
    if(e.code && /^Digit[1-9]$/.test(e.code)) return e.code.replace('Digit','');
    if(e.code && /^Numpad[1-9]$/.test(e.code)) return e.code.replace('Numpad','');
    const k = String(e.key || '');
    return /^[1-9]$/.test(k) ? k : '';
  }
  function block(e){
    e.preventDefault();
    e.stopPropagation();
    if(typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
  }
  window.addEventListener('keydown', function(e){
    if(!isModalOpen()) return;
    if(e.ctrlKey || e.metaKey || e.altKey) return;
    const digit = digitFromEvent(e);
    if(!digit) return;

    const stamp = String(e.timeStamp || '') + '|' + digit;
    const t = now();

    // Always fully own numeric modal picks here so downstream duplicate listeners cannot fire.
    block(e);

    // Ignore auto-repeat / held key / duplicate dispatch during the same event tick.
    if(e.repeat) return;
    if(state.keyHeld.has(digit)) return;
    if(state.lastEventStamp === stamp) return;
    if(t < state.dispatchLockUntil) return;

    state.keyHeld.add(digit);
    state.lastEventStamp = stamp;
    state.dispatchLockUntil = t + 60;

    const idx = Number(digit) - 1;
    const acts = Array.isArray(window.searchResultAction) ? window.searchResultAction : [];
    const fn = acts[idx];
    if(typeof fn !== 'function') return;

    try {
      fn();
    } finally {
      setTimeout(function(){
        state.dispatchLockUntil = 0;
      }, 0);
    }
  }, true);

  window.addEventListener('keyup', function(e){
    const digit = digitFromEvent(e);
    if(!digit) return;
    state.keyHeld.delete(digit);
  }, true);

  window.addEventListener('blur', function(){
    state.keyHeld.clear();
    state.lastEventStamp = null;
    state.dispatchLockUntil = 0;
  }, true);
})();
</script>
