<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>카드 뭐 뽑지?</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0c0d12;--s1:#151720;--s2:#0f1017;--bd:#1e2030;--bd2:#2a2d3e;--tx:#f5f5f7;--sub:#a1a1a6;--dim:#86868b;--dk:#636366}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;font-size:15px;max-width:440px;margin:0 auto;padding:20px 16px 60px;min-height:100vh;-webkit-font-smoothing:antialiased}
body.modal-lock{position:fixed;left:0;right:0;overflow:hidden;width:100%;touch-action:none}
.hdr{display:none}
.hdr h1{font-size:28px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.hdr p{font-size:14px;color:var(--dim);font-weight:500}
.card{background:var(--s1);border-radius:16px;padding:18px;margin-bottom:14px;border:1px solid var(--bd)}
.card-label{font-size:18px;font-weight:500;color:#b7c0da;margin-bottom:12px;letter-spacing:-.01em}
/* 캐릭터 선택 */
.char-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;padding-right:20px;scrollbar-width:none;margin-bottom:12px;touch-action:pan-x;cursor:grab}
.char-row::-webkit-scrollbar{display:none}
.char-row.dragging{cursor:grabbing}
.char-btn{flex-shrink:0;padding:9px 16px;border-radius:20px;border:1.5px solid color-mix(in srgb,var(--cc) 42%, #000);background:color-mix(in srgb,var(--cc) 20%, #000 80%);color:var(--cc);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;white-space:nowrap}
.char-btn.on{color:#fff;border-color:color-mix(in srgb,var(--cc) 75%, #000);background:color-mix(in srgb,var(--cc) 38%, #000 62%);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--cc) 22%, transparent)}
.char-btn img{width:18px;height:18px;object-fit:contain;margin-right:6px;vertical-align:-4px}
.char-btn span{vertical-align:middle}
/* 빌드 */
.builds{display:flex;gap:8px;flex-wrap:wrap}
.mode-tabs{display:flex;gap:0;margin-bottom:12px;border-radius:10px;overflow:hidden;border:1px solid var(--bd2);background:var(--bg)}
.mode-tab{flex:1;padding:11px;background:none;border:none;color:var(--dk);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.mode-tab.on{background:var(--bd2);color:var(--tx);font-weight:700}
.mode-tab{position:relative}
.mode-tab-keycap{display:none;position:absolute;top:7px;right:8px;min-width:18px;height:18px;padding:0 5px;border-radius:6px;align-items:center;justify-content:center;font-size:10px;font-weight:800;line-height:1;color:#e5edf8;background:linear-gradient(180deg,#1f2937,#111827);border:1px solid rgba(148,163,184,.38);box-shadow:inset 0 1px 0 rgba(255,255,255,.14),0 3px 10px rgba(0,0,0,.35)}
@media (min-width: 1024px){.mode-tab-keycap{display:inline-flex}.mode-tab{padding-right:34px}}

.app-tabs{display:flex;gap:0;margin:12px 0 14px;border-radius:14px;overflow:hidden;border:1px solid var(--bd2);background:var(--s1);box-shadow:0 10px 28px rgba(0,0,0,.22)}
.app-tab{position:relative;flex:1;padding:13px 10px;background:transparent;border:none;color:var(--sub);font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:.18s}
.app-tab+.app-tab{border-left:1px solid rgba(255,255,255,.05)}
.app-tab.on{background:linear-gradient(180deg, color-mix(in srgb,var(--cc) 14%, var(--s2)), var(--s2));color:#fff;box-shadow:inset 0 -2px 0 color-mix(in srgb,var(--cc) 65%, transparent)}
.app-tab small{display:block;font-size:11px;font-weight:700;color:var(--dk);margin-top:2px}
.app-tab.on small{color:color-mix(in srgb,var(--cc) 65%, #fff)}
.guide-tab{display:none}
.guide-list{display:flex;flex-direction:column;gap:10px}
.guide-card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:14px}
.guide-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px}
.guide-head-main{min-width:0;flex:1}
.guide-title{font-size:18px;font-weight:800;color:var(--tx);line-height:1.2}
.guide-desc{font-size:13px;color:var(--sub);line-height:1.6}
.guide-meta{margin-top:8px;font-size:12px;color:var(--dim);line-height:1.6}

.build-meta{display:flex;align-items:center;flex-wrap:wrap;gap:6px 8px;margin-top:8px;font-size:12px;color:var(--dim);line-height:1.6}
.build-completion{position:relative;display:inline-flex;align-items:center;gap:8px;padding:2px 0 2px 2px;white-space:nowrap}
.build-completion.rank-up{animation:completionPop .75s cubic-bezier(.2,.9,.2,1)}
.flame-wrap{position:relative;width:22px;height:26px;display:inline-block;flex:0 0 auto}
.flame-icon{position:absolute;left:2px;bottom:0;width:18px;height:24px;border-radius:60% 60% 55% 55%/72% 72% 34% 34%;transform-origin:50% 100%;filter:drop-shadow(0 0 8px rgba(251,191,36,.25));animation:flameFlicker 1.05s ease-in-out infinite;background:radial-gradient(circle at 50% 72%, rgba(255,246,214,.98) 0 16%, rgba(255,214,102,.98) 24%, rgba(251,191,36,.96) 42%, rgba(245,124,0,.9) 68%, rgba(190,24,93,.72) 100%)}
.flame-icon::before{content:'';position:absolute;left:4px;top:2px;width:10px;height:12px;border-radius:60% 60% 50% 50%/66% 66% 34% 34%;background:radial-gradient(circle at 50% 72%, rgba(255,251,235,.98) 0 26%, rgba(254,240,138,.86) 48%, rgba(254,240,138,0) 100%);opacity:.95}
.flame-burst,.flame-ring,.flame-sparks{position:absolute;pointer-events:none;opacity:0}
.flame-burst{inset:-14px;border-radius:999px}
.flame-ring{inset:-10px;border-radius:999px;border:1px solid rgba(255,255,255,.2);transform:scale(.4)}
.flame-sparks{inset:-18px;filter:blur(.3px)}
.flame-sparks::before,.flame-sparks::after{content:'';position:absolute;inset:0;background:
  radial-gradient(circle at 28% 35%, rgba(255,255,255,.95) 0 1.8px, transparent 2.2px),
  radial-gradient(circle at 64% 24%, rgba(255,255,255,.9) 0 1.6px, transparent 2px),
  radial-gradient(circle at 78% 48%, rgba(255,255,255,.9) 0 1.8px, transparent 2.1px),
  radial-gradient(circle at 34% 74%, rgba(255,255,255,.8) 0 1.5px, transparent 1.9px),
  radial-gradient(circle at 70% 70%, rgba(255,255,255,.85) 0 1.7px, transparent 2px)}
.build-completion.rank-up .flame-burst{animation:flameBurst .85s cubic-bezier(.2,.8,.2,1)}
.build-completion.rank-up .flame-ring{animation:flameRing .9s ease-out}
.build-completion.rank-up .flame-sparks{animation:sparkBurst .95s ease-out}
.completion-text{font-size:12px;font-weight:800;letter-spacing:-.01em;color:rgba(224,228,238,.86);text-shadow:none;display:inline-block}
.completion-text .percent{font-weight:900}
.build-completion.level-1 .flame-icon{background:radial-gradient(circle at 50% 72%, rgba(229,186,132,.95) 0 12%, rgba(154,95,42,.92) 28%, rgba(103,64,34,.84) 58%, rgba(50,32,19,.55) 100%);filter:drop-shadow(0 0 6px rgba(154,95,42,.18));animation-duration:1.28s}
.build-completion.level-1 .completion-text{color:#b98556}
.build-completion.level-2 .flame-icon{background:radial-gradient(circle at 50% 72%, rgba(243,246,251,.94) 0 14%, rgba(191,199,213,.94) 24%, rgba(137,147,163,.90) 54%, rgba(84,95,115,.72) 100%);filter:drop-shadow(0 0 7px rgba(148,163,184,.22));animation-duration:1.04s}
.build-completion.level-2 .completion-text{color:#c8d0de}
.build-completion.level-3 .flame-icon{background:radial-gradient(circle at 50% 72%, rgba(255,246,214,.98) 0 14%, rgba(245,198,84,.98) 24%, rgba(206,145,44,.95) 52%, rgba(125,84,26,.80) 100%);filter:drop-shadow(0 0 10px rgba(245,198,84,.30));animation-duration:.94s}
.build-completion.level-3 .completion-text{background:linear-gradient(90deg,#fff1c4 0%,#f1c25c 24%,#fff1c4 50%,#bf8730 76%,#fff1c4 100%);background-size:220% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;text-shadow:none;animation:textSweepBg 3.4s linear infinite}
.build-completion.level-4 .flame-icon{background:radial-gradient(circle at 50% 72%, rgba(255,247,226,.98) 0 12%, rgba(255,184,76,.98) 18%, rgba(255,108,56,.97) 42%, rgba(212,58,37,.92) 68%, rgba(118,16,24,.78) 100%);filter:drop-shadow(0 0 12px rgba(239,68,68,.38));animation-duration:.82s}
.build-completion.level-4 .completion-text{background:linear-gradient(90deg,#ffe7b8 0%,#ffb347 18%,#ff7a4f 42%,#ffd38f 66%,#ff9c54 100%);background-size:230% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;text-shadow:none;animation:textSweepBg 2.4s linear infinite}
.build-completion.level-5 .flame-icon{background:linear-gradient(135deg,#fff4b1 2%,#ff9ad8 16%,#8be9ff 34%,#fff07d 50%,#d4b3ff 68%,#ff889e 84%,#fff4b1 100%);background-size:230% 230%;filter:drop-shadow(0 0 14px rgba(192,132,252,.46));animation:flameFlicker .78s ease-in-out infinite, prismShift 1.9s linear infinite}
.build-completion.level-5 .flame-icon::after{content:'';position:absolute;inset:-5px;border-radius:999px;background:conic-gradient(from 0deg, rgba(255,255,255,0), rgba(255,255,255,.48), rgba(255,255,255,0), rgba(255,255,255,.35), rgba(255,255,255,0));filter:blur(3px);opacity:.8;animation:prismShift 1.75s linear infinite}
.build-completion.level-5 .completion-text{background:linear-gradient(90deg,#fff6ca 0%,#ffc8e6 22%,#bcf4ff 44%,#fff0a8 66%,#dfc3ff 88%,#fff6ca 100%);background-size:220% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;text-shadow:none;animation:textSweepBg 1.6s linear infinite}
.build-completion.level-1 .flame-burst{background:radial-gradient(circle, rgba(205,127,50,.42) 0, rgba(205,127,50,.2) 36%, rgba(205,127,50,0) 74%)}
.build-completion.level-2 .flame-burst{background:radial-gradient(circle, rgba(226,232,240,.6) 0, rgba(203,213,225,.28) 40%, rgba(203,213,225,0) 78%)}
.build-completion.level-3 .flame-burst{background:radial-gradient(circle, rgba(255,225,107,.62) 0, rgba(255,184,61,.3) 40%, rgba(255,184,61,0) 78%)}
.build-completion.level-4 .flame-burst{background:radial-gradient(circle, rgba(255,217,102,.64) 0, rgba(255,108,56,.34) 42%, rgba(229,57,53,0) 80%)}
.build-completion.level-5 .flame-burst{background:radial-gradient(circle, rgba(255,255,255,.72) 0, rgba(217,70,239,.36) 26%, rgba(34,211,238,.3) 46%, rgba(250,204,21,.22) 64%, rgba(255,255,255,0) 84%)}
@keyframes flameFlicker{0%{transform:translateY(0) scale(.94)}22%{transform:translateY(-1.4px) scale(1.02)}54%{transform:translateY(-3px) scale(1.16)}100%{transform:translateY(0) scale(.97)}}
@keyframes completionPop{0%{transform:scale(1)}28%{transform:scale(1.14)}55%{transform:scale(.98)}100%{transform:scale(1)}}
@keyframes flameBurst{0%{opacity:0;transform:scale(.28)}24%{opacity:1;transform:scale(.9)}55%{opacity:.9;transform:scale(1.35)}100%{opacity:0;transform:scale(1.85)}}
@keyframes flameRing{0%{opacity:.1;transform:scale(.36)}25%{opacity:.72;transform:scale(.96)}100%{opacity:0;transform:scale(1.58)}}
@keyframes sparkBurst{0%{opacity:0;transform:scale(.45) rotate(0deg)}28%{opacity:1;transform:scale(1) rotate(8deg)}100%{opacity:0;transform:scale(1.55) rotate(18deg)}}
@keyframes textSweep{0%,12%{transform:translateX(-120%)}32%,100%{transform:translateX(135%)}}
@keyframes textSweepBg{0%{background-position:0% 50%}100%{background-position:200% 50%}}
@keyframes prismShift{0%{background-position:0% 50%}100%{background-position:220% 50%}}

.fireworks{position:absolute;left:0;top:50%;width:0;height:0;pointer-events:none}
.fireworks::before,.fireworks::after{content:'';position:absolute;left:0;top:0;width:3px;height:3px;border-radius:999px;opacity:0;transform:translate(-50%,-50%) scale(.2);}
.build-completion.perfect .fireworks::before{background:radial-gradient(circle, rgba(255,255,255,.95) 0 20%, rgba(255,215,80,.95) 42%, rgba(255,105,180,.82) 68%, rgba(255,255,255,0) 74%);box-shadow:0 0 0 0 rgba(255,255,255,.0);animation:fireworkBlastA 1.15s ease-out infinite}
.build-completion.perfect .fireworks::after{background:radial-gradient(circle, rgba(255,255,255,.95) 0 20%, rgba(124,232,255,.95) 42%, rgba(218,112,255,.82) 68%, rgba(255,255,255,0) 74%);animation:fireworkBlastB 1.25s .2s ease-out infinite}
@keyframes fireworkBlastA{0%{opacity:0;transform:translate(-16px,-50%) scale(.15)}12%{opacity:1}100%{opacity:0;transform:translate(-16px,-50%) scale(1.5)}}
@keyframes fireworkBlastB{0%{opacity:0;transform:translate(110px,-54%) scale(.15)}12%{opacity:1}100%{opacity:0;transform:translate(110px,-54%) scale(1.55)}}

.guide-rep-row{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
.guide-rep-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.08);background:var(--s2);color:#d9dbe3;font-size:12px;font-weight:700;line-height:1;cursor:pointer;font-family:inherit;max-width:100%}
.guide-rep-badge .k{color:var(--dim);font-weight:700;flex-shrink:0}
.guide-rep-badge .v{color:var(--tx);font-weight:800;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.guide-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.guide-btn{padding:10px 12px;border-radius:10px;border:1px solid var(--bd2);background:var(--bg);color:var(--tx);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.guide-btn.primary{border-color:var(--cc);color:var(--cc)}
.build-btn{padding:9px 16px;border-radius:20px;border:1.5px solid var(--bd2);background:var(--s2);color:var(--dim);font-size:14px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit}
.build-btn.on{border-color:var(--bc);color:var(--bc);background:color-mix(in srgb,var(--bc) 14%,transparent);font-weight:700}

.build-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
}
.build-pct{
  font-size:11px;
  font-weight:800;
  letter-spacing:-.01em;
  opacity:.96;
}
.build-pct.level-1{color:#9ca3af}
.build-pct.level-2{color:#f59e0b}
.build-pct.level-3{color:#fbbf24}
.build-pct.level-4{color:#f87171}
.build-pct.level-5{
  background:linear-gradient(120deg,#ff4fd8,#7cf7ff,#fff27a,#ff4fd8);
  background-size:220% 220%;
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  animation:prismShift 2.8s linear infinite;
}

.build-info{margin-top:10px;font-size:14px;color:var(--sub);line-height:1.7}
/* 보상 */
.reward-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.reward-slot{border-radius:10px;border:2px dashed var(--bd2);background:var(--s2);cursor:pointer;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;transition:.15s;height:88px;min-height:88px;aspect-ratio:auto}
.reward-slot:hover{border-color:var(--dim)}
.reward-slot.filled{border-style:solid;border-color:var(--bd2)}
.reward-slot .rs-ph{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--dk);font-weight:600;text-align:center;padding:0}.reward-slot .rs-ph .ph-plus{font-size:18px;line-height:1;opacity:.9}.reward-slot .rs-ph .ph-label{font-size:12px;line-height:1.25;opacity:.8}
.reward-slot .rs-img{width:100%;height:100%;display:block;object-fit:contain;object-position:center center;border-radius:8px;padding:4px;background:transparent}
.reward-slot .rs-name{position:absolute;bottom:0;left:0;right:0;padding:12px 4px 6px;background:linear-gradient(transparent,rgba(0,0,0,.88));font-size:13px;font-weight:700;color:#fff;text-align:center}
.reward-slot .rs-tier{position:absolute;top:5px;right:5px;font-size:11px;font-weight:800;color:#fff;padding:3px 7px;border-radius:6px}
.reward-slot .rs-clear{position:absolute;top:5px;left:5px;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:14px;cursor:pointer;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.shop-pool-info{margin-bottom:10px;padding:10px 12px;border-radius:12px;background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.18)}
.shop-pool-head{font-size:12px;font-weight:800;color:#93c5fd;margin-bottom:4px;letter-spacing:.01em}
.shop-pool-desc{font-size:12px;color:var(--sub);line-height:1.55}
.shop-pool-desc strong{color:var(--tx)}
.shop-slot-group{margin-top:10px}
.shop-slot-group.colorless{padding:10px;border-radius:14px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08)}
.shop-slot-label{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13px;font-weight:800;color:var(--tx);margin-bottom:8px}
.shop-slot-label span{font-size:11px;font-weight:700;color:var(--dim)}
.reward-row-shop,.reward-row-colorless{display:grid;gap:8px;margin-bottom:0}
.reward-row-shop .reward-slot,.reward-row-colorless .reward-slot{height:88px;min-height:88px;aspect-ratio:auto}
.reward-row-shop .reward-slot .rs-ph,.reward-row-colorless .reward-slot .rs-ph{height:100%}
.reward-row-shop .reward-slot .rs-img,.reward-row-colorless .reward-slot .rs-img{width:100%;height:100%;object-fit:contain;object-position:center center;padding:4px}
.slot-dot.colorless{background:#374151}.slot-dot.on.colorless{background:#93c5fd}
.slot-hint{margin:-2px 0 10px;font-size:12px;color:#93c5fd;font-weight:700}

.tier-S,.sg-tier.tier-S,.rs-tier.tier-S,.res-tier-pill.tier-S{
  color:#243244;
  background:linear-gradient(120deg,#ff4fd8,#7cf7ff,#fff27a,#ff4fd8);
  background-size:220% 220%;
  border:1px solid rgba(255,255,255,.42);
  box-shadow:0 0 12px rgba(255,79,216,.28), inset 0 0 10px rgba(255,255,255,.12);
  animation:prismShift 2.8s linear infinite, tierPulseSoft 2.2s ease-in-out infinite;
  text-shadow:
    0 1px 0 rgba(255,255,255,.18),
    0 0 1px rgba(31,41,55,.45),
    0 1px 2px rgba(31,41,55,.28);
  -webkit-text-stroke:.15px rgba(31,41,55,.22);
}
.tier-S,.sg-tier.tier-S,.rs-tier.tier-S,.res-tier-pill.tier-S{
  font-weight:800;
}
.tier-A,.sg-tier.tier-A,.rs-tier.tier-A,.res-tier-pill.tier-A{
  color:#221305;
  background:linear-gradient(180deg,#ffe083,#f59e0b);
  border:1px solid rgba(255,214,102,.65);
  box-shadow:0 0 10px rgba(245,158,11,.22);
  animation:tierShimmerGold 2.6s linear infinite, tierPulseSoft 2.4s ease-in-out infinite;
  background-size:180% 180%;
}
.tier-B,.sg-tier.tier-B,.rs-tier.tier-B,.res-tier-pill.tier-B{
  color:#f8fafc;
  background:linear-gradient(180deg,#d5dce8,#8d98a9);
  border:1px solid rgba(226,232,240,.45);
  box-shadow:0 0 8px rgba(148,163,184,.16);
  animation:tierShimmerSilver 3.2s linear infinite, tierPulseSoft 2.8s ease-in-out infinite;
  background-size:180% 180%;
}
.tier-C,.sg-tier.tier-C,.rs-tier.tier-C,.res-tier-pill.tier-C{
  color:#fff7ed;
  background:linear-gradient(180deg,#b98252,#7c4a24);
  border:1px solid rgba(217,119,6,.35);
  box-shadow:0 0 7px rgba(146,64,14,.16);
  animation:tierShimmerBronze 3.2s linear infinite, tierPulseSoft 2.8s ease-in-out infinite;
  background-size:180% 180%;
}
.tier-D,.sg-tier.tier-D,.rs-tier.tier-D,.res-tier-pill.tier-D{
  color:#e5e7eb;
  background:linear-gradient(180deg,#5b6474,#3a4250);
  border:1px solid rgba(148,163,184,.24);
}
@keyframes prismShift{
  0%{background-position:0% 50%}
  100%{background-position:220% 50%}
}
@keyframes tierShimmerGold{
  0%{background-position:0% 50%;filter:brightness(1)}
  50%{filter:brightness(1.07)}
  100%{background-position:180% 50%;filter:brightness(1)}
}
@keyframes tierShimmerSilver{
  0%{background-position:0% 50%;filter:brightness(1)}
  50%{filter:brightness(1.06)}
  100%{background-position:180% 50%;filter:brightness(1)}
}
@keyframes tierShimmerBronze{
  0%{background-position:0% 50%;filter:brightness(1)}
  50%{filter:brightness(1.06)}
  100%{background-position:180% 50%;filter:brightness(1)}
}
@keyframes tierPulseSoft{
  0%,100%{transform:translateZ(0);box-shadow:0 0 0 rgba(255,255,255,0)}
  50%{transform:translateY(-.5px);box-shadow:0 0 10px rgba(255,255,255,.05)}
}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal-box{background:var(--s1);border-radius:18px;width:100%;max-width:400px;height:80vh;display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--bd2)}

.mini-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}

}

<script>
// ═══════════════════════════════════════
// 초성 검색
// ═══════════════════════════════════════
const CHO='ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ'.split('');
const CHO_SET=new Set(CHO);
const COMPOUND={ㄳ:'ㄱㅅ',ㄵ:'ㄴㅈ',ㄶ:'ㄴㅎ',ㄺ:'ㄹㄱ',ㄻ:'ㄹㅁ',ㄼ:'ㄹㅂ',ㄽ:'ㄹㅅ',ㄾ:'ㄹㅌ',ㄿ:'ㄹㅍ',ㅀ:'ㄹㅎ',ㅄ:'ㅂㅅ'};
function decompose(s){return[...s].map(c=>COMPOUND[c]||c).join('')}
function getChosung(s){return[...s].map(c=>{const d=c.charCodeAt(0)-0xAC00;return d<0||d>11171?c:CHO[Math.floor(d/588)]}).join('')}
function isChosungLike(s){return[...s].every(c=>CHO_SET.has(c)||c in COMPOUND)}
function matchSearch(name,q){return getSearchRank(name,q)>-1}
function getSearchRank(name,q){
  if(!q) return 0;
  q=q.replace(/\s/g,'');
  const n=name.replace(/\s/g,'');
  const nLow=n.toLowerCase(), qLow=q.toLowerCase();
  const idx=nLow.indexOf(qLow);
  if(idx===0) return 1000-q.length;
  if(idx>0) return 700-idx;
  const chosung=getChosung(n), dq=decompose(q);
  if(isChosungLike(q)){
    const cidx=chosung.indexOf(dq);
    if(cidx===0) return 950-dq.length;
    if(cidx>0) return 650-cidx;
  }
  return -1;
}

// ═══════════════════════════════════════
// 이미지
// ═══════════════════════════════════════
const IMG='https://cdn.jsdelivr.net/gh/elithelucky/sts2-images@latest/';
const SUFFIX_MAP={ironclad:'Ironclad',silent:'Silent',defect:'Defect',necro:'Necrobinder',regent:'Regent',colorless:'Colorless'};
function imgBaseName(name){return (name||'').replace(/\s+/g,'').replace(/[''!?]/g,'')}
function getCardOwner(name, preferredChar=curChar){
  const preferred=ALL[preferredChar];
  if(preferred&&preferred.cards&&preferred.cards.some(x=>x.n===name)) return preferredChar;
  if(typeof COLORLESS_CARDS!=='undefined' && COLORLESS_CARDS.some(x=>x.n===name)) return 'colorless';
  for(const [charKey,data] of Object.entries(ALL)){
    if(data&&data.cards&&data.cards.some(x=>x.n===name)) return charKey;
  }
  return preferredChar||'ironclad';
}
function findRepoCardByName(name, preferredChar=curChar){
  try{
    if(!(typeof REPO_POOLS!=='undefined' && REPO_POOLS)) return null;
    const nn = (typeof norm==='function') ? norm(name) : String(name||'').replace(/\s+/g,'').trim().toLowerCase();
    const same = (c) => (c && (c.__norm===nn || ((c.n||'').replace(/\s+/g,'').toLowerCase()===nn)));
    const preferredOrder = [];
    if(preferredChar && preferredChar !== 'colorless') preferredOrder.push(preferredChar);
    preferredOrder.push('ironclad','silent','defect','necro','regent');
    const classOrder = [...new Set(preferredOrder)];
    for(const k of classOrder){
      const exactClass = (REPO_POOLS[k]||[]).find(same);
      if(exactClass && exactClass.filename) return exactClass;
    }
    const exactColorless = (REPO_POOLS.colorless||[]).find(same);
    if(exactColorless && exactColorless.filename) return exactColorless;
  }catch(e){}
  return null;
}
function imgSrcs(name, preferredChar=curChar){
  const base=imgBaseName(name);
  const exact = findRepoCardByName(name, preferredChar);
  if(exact && exact.filename){
    if(exact.__kind==='colorless') return [IMG + encodeURIComponent(exact.filename)];
    return [IMG + encodeURIComponent(exact.filename), IMG+encodeURIComponent(base+'_Colorless')+'.webp'];
  }
  const owner=getCardOwner(name,preferredChar);
  if(owner==='colorless'){
    return [IMG+encodeURIComponent(base+'_Colorless')+'.webp'];
  }
  const suf=SUFFIX_MAP[owner]||SUFFIX_MAP[preferredChar]||SUFFIX_MAP[curChar]||'Ironclad';
  return [IMG+encodeURIComponent(base+'_'+suf)+'.webp', IMG+encodeURIComponent(base+'_Colorless')+'.webp'];
}
function imgSrcsForChar(name,charKey){
  return imgSrcs(name, charKey);
}
function getCardByChar(charKey,name){
  if(charKey==='colorless') return (typeof COLORLESS_CARDS!=='undefined'?COLORLESS_CARDS:[]).find(x=>x.n===name)||null;
  const data=ALL[charKey];return data&&data.cards?data.cards.find(x=>x.n===name):null
}
function openCoopGuide(id){
  const guide=COOP_GUIDES.find(x=>x.id===id); if(!guide) return;
  detailStack=[];
  const body=document.getElementById('detailBody');
  const modal=document.getElementById('detailModal');
  const esc=(s='')=>String(s).replace(/'/g,'&#39;');
  const byChar=(guide.must||[]).concat(guide.rec||[]).reduce((acc,item)=>{(acc[item.char]=acc[item.char]||[]).push(item);return acc;},{});
  const cardTile=(item)=>{
    const srcs=imgSrcsForChar(item.name,item.char);
    const charName=(CHARS[item.char]&&CHARS[item.char].name)||item.char;
    const unlockCond=UNLOCK[item.name];
    return `<button class="mini-card" onclick="showAnyCardDetail('${esc(item.name)}','${item.char}')"><img src="${srcs[0]}" onerror="if(!this.dataset.f1){this.dataset.f1='1';this.src='${srcs[1]}';return;} this.onerror=null;this.src='${srcs[2]||srcs[1]}'"><div class="mini-name">${unlockCond?'<div class=\"mini-lock\">🔒</div>':''}<div>${item.name}</div><div class="mini-meta-pill"><span class="coop-pill sm" style="--cc:${(CHARS[item.char]&&CHARS[item.char].color)||'#888'}"><img src="${profileImgSrc(item.char)}" onerror="this.onerror=null;this.style.display='none'"></span></div></div></button>`;
  };
  let h='';
  h+=`<button class="detail-top-close" onclick="closeDetail()">✕</button>`;
  h+=renderCoopTitleButtons(guide);
  h+=`<div class="detail-text" style="margin-top:8px">${guide.desc||''}</div>`;
  h+=`<div class="detail-chip-row" style="margin-top:10px;margin-bottom:18px"><span class="badge good">${guide.meta||''}</span></div>`;
  h+=`<div class="detail-two-col">`;
  h+=`<div class="guide-group core" style="margin-top:0;"><div class="guide-group-title">필수 카드</div><div class="ref-mini-desc" style="color:color-mix(in srgb,var(--sub) 88%, #000 12%);margin-bottom:18px">이 카드들이 잡혀야 조합의 정체성이 선명해짐</div><div class="mini-grid">${(guide.must||[]).map(cardTile).join('')}</div></div>`;
  h+=`<div class="guide-group key" style="margin-top:0;"><div class="guide-group-title">시너지 카드</div><div class="ref-mini-desc" style="color:color-mix(in srgb,var(--sub) 88%, #000 12%);margin-bottom:18px">이 카드들이 모일수록 빌드가 제대로 굴러가기 시작합니다.</div><div class="mini-grid">${(guide.rec||[]).map(cardTile).join('')}</div></div>`;
  h+=`</div>`;
  const sections=Object.entries(byChar).map(([charKey,items])=>`<div class="guide-group compact-section" style="border-width:2px"><div class="guide-group-title">${CHARS[charKey]?.name||charKey} 쪽에서 챙길 카드</div><div class="mini-grid">${items.map(cardTile).join('')}</div></div>`).join('');
  if(sections){h+=`<div class="guide-divider"></div><div class="detail-secondary-grid">${sections}</div>`;}
  if((guide.tips||[]).length){
    h+=`<div class="guide-divider"></div><div class="guide-group"><div class="guide-group-title">운용 포인트</div><div class="detail-section" style="padding:0;border:none;background:none">${guide.tips.map(t=>`<div class="detail-text" style="margin-top:0;margin-bottom:10px">• ${t}</div>`).join('')}</div></div>`;
  }
  h+=`<button class="detail-close" onclick="closeDetail()">닫기</button>`;
  body.innerHTML=h; modal.classList.add('open'); updateBodyLock();
}
function showAnyCardDetail(name,charKey){
  const prev=curChar;
  curChar=charKey;
  showDetail(name);
  curChar=prev;
}
function makeImg(name,el,preferredChar=curChar){const srcs=imgSrcs(name, preferredChar);const img=document.createElement('img');img.loading='lazy';img.classList.add('img-loading');img.dataset.tries='0';img.onload=function(){this.classList.remove('img-loading')};img.onerror=function(){const t=parseInt(this.dataset.tries)+1;if(t<srcs.length){this.dataset.tries=t;this.src=srcs[t]}else{const ph=document.createElement('div');ph.className=el==='sg'?'sg-ph':el==='dk'?'dk-ph':'';ph.textContent=name.slice(0,2);this.replaceWith(ph)}};img.src=srcs[0];return img}
function profileImgSrc(charKey){const f=(CHARS[charKey]&&CHARS[charKey].profile)||'';return IMG+encodeURIComponent(f)}
function getCoopChars(guide){const seen=[];[...(guide.must||[]),...(guide.rec||[])].forEach(item=>{if(item&&item.char&&!seen.includes(item.char))seen.push(item.char)});return seen}
function renderCoopTitleButtons(guide){const keys=getCoopChars(guide);if(!keys.length) return `<div class="coop-title">${guide.name}</div>`;return `<div class="coop-title-bar">`+keys.map((key,idx)=>{const v=CHARS[key]||{name:key,color:'#888'};return `<div class="coop-pill" style="--cc:${v.color}"><img src="${profileImgSrc(key)}" onerror="this.onerror=null;this.style.display='none'"><span>${v.name}</span></div>`+(idx<keys.length-1?`<span class="coop-title-plus">+</span>`:'')}).join('')+`</div>`}
function getVisibleCoopGuides(){return COOP_GUIDES.filter(g=>getCoopChars(g).includes(curChar))}

// ═══════════════════════════════════════
// 캐릭터 데이터
// ═══════════════════════════════════════
const CHARS={
  ironclad:{name:'아이언클래드',color:'#ef7b68',profile:'profile_Ironclad.webp'},
  silent:{name:'사일런트',color:'#39c98a',profile:'profile_Silent.webp'},
  defect:{name:'디펙트',color:'#38a3db',profile:'profile_Defect.webp'},
  necro:{name:'네크로바인더',color:'#8b5cf6',profile:'profile_Necrobinder.webp'},
  regent:{name:'리젠트',color:'#d39a2c',profile:'profile_Regent.webp'}
};
const START_DECKS={
  ironclad:['타격','타격','타격','타격','타격','수비','수비','수비','수비','강타'],
  silent:['타격','타격','타격','타격','타격','수비','수비','수비','수비','수비','무력화','생존자'],
  defect:['타격','타격','타격','타격','수비','수비','수비','수비','파지직','이중 시전'],
  necro:['타격','타격','타격','타격','수비','수비','수비','수비','호위','풀어놓기'],
  regent:['타격','타격','타격','타격','수비','수비','수비','수비','별똥별','추앙'],
};
const BASIC_CARDS={
  ironclad:['타격','수비','강타'],silent:['타격','수비','무력화','생존자'],
  defect:['타격','수비','이중 시전','파지직'],necro:['타격','수비','풀어놓기','호위'],
  regent:['타격','수비','별똥별','추앙'],

function isSearchableCard(card, charKey=curChar){
  if(!card || typeof card.n!=='string' || !card.n.trim()) return false;
  if(typeof card.t!=='string' || typeof card.tier!=='string') return false;
  const inClass=(ALL[charKey]&&ALL[charKey].cards||[]).some(x=>x&&x.n===card.n);
  const inColorless=COLORLESS_CARDS.some(x=>x&&x.n===card.n);
  return inClass || inColorless;
}
function getCurrentCardPool(){
  const classCards=(ALL[curChar]&&ALL[curChar].cards)?ALL[curChar].cards:[];
  const seen=new Set();
  return [...classCards, ...COLORLESS_CARDS].filter(card=>{
    if(!isSearchableCard(card,curChar)) return false;
    if(seen.has(card.n)) return false;
    seen.add(card.n);
    return true;
  });

  // shop: if purchase-end is the best choice, force it to the very top
  if (isShopMode) {
    const skipNode = body.querySelector('.res-skip-compact.skip-best');
    if (skipNode) {
      body.prepend(skipNode);
    }
  }
}
function getCardMeta(name, preferredChar=curChar){
  const preferred=ALL[preferredChar];
  if(preferred&&preferred.cards){
    const hit=preferred.cards.find(x=>x.n===name);
    if(hit) return hit;
  }
  const colorlessHit=COLORLESS_CARDS.find(x=>x.n===name);
  if(colorlessHit) return colorlessHit;
  for(const data of Object.values(ALL)){
    const hit=data.cards.find(x=>x.n===name);
    if(hit) return hit;
  }
  return null;
}

function getComboMatches(name,d){
  const full=[],partial=[];
  (d.combos||[]).forEach(cb=>{
    if(!listHasCard(cb.cards,name)) return;
    const others=cb.cards.filter(x=>x!==name);
    const have=others.filter(x=>deck.includes(x));
    if(have.length===others.length) full.push({cb,have,missing:[]});
    else if(have.length>0) partial.push({cb,have,missing:others.filter(x=>!deck.includes(x))});
  });
  return {full,partial};
}
function getCardBuildRefs(name,d){
  return (d.archs||[]).filter(a=>listHasCard(a.must,name)||listHasCard(a.rec,name));
}
function getRunStage(){
  const base=(START_DECKS[curChar]||[]).length||10;
  const added=Math.max(0,deck.length-base);
  const shopRuns=hist.filter(h=>Array.isArray(h.f)&&h.f.length===SHOP_SLOT_COUNT).length;
  const picked=hist.filter(h=>h.p && h.p!=='스킵').length;
  let score=added*10 + shopRuns*12 + picked*4;
  if(added<=4) score-=10;
  if(added>=10) score+=10;
  const stage=score<45?'early':(score<95?'mid':'late');
  return {score,added,shopRuns,picked,stage};
}
function isAct1Like(){
  return getRunStage().stage==='early';
}
const BUILD_COMPLETION_MEM={};

function buildScoreToPct(score,maxScore){
  if(!maxScore || maxScore<=0) return 0;
  return Math.round(Math.max(0, Math.min(100, (score/maxScore)*100)));
}
function normalizeCardName(name){
  return String(name||'').replace(/\s+/g,'').trim();
}
function sameCardName(a,b){
  return normalizeCardName(a)===normalizeCardName(b);
}
function deckHasCard(name, deckArr=deck){
  return Array.isArray(deckArr) && deckArr.some(x=>sameCardName(x,name));
}
function listHasCard(list, name){
  return Array.isArray(list) && list.some(x=>sameCardName(x,name));
}
function countDeckMatches(list, deckArr=deck){
  if(!Array.isArray(list) || !Array.isArray(deckArr)) return 0;
  return list.filter(n=>deckHasCard(n, deckArr)).length;
}
function getBuildScoreMap(){
  const map={};
  detectBuildScores().forEach(x=>{ map[x.id]=x; });
  return map;
}
function getBuildCompletionState(a,mh,rh){
  const d=D();
  const owned=new Set((Array.isArray(deck)?deck:[]).map(normalizeCardName));
  const must=(a.must||[]);
  const rec=(a.rec||[]);
  const uniqueNames=[...new Set([...must,...rec])];
  let score=0, maxScore=0;

  uniqueNames.forEach(name=>{
    const c=d.cards.find(x=>x.n===name)||{};
    const isMust=must.includes(name);
    const base = isMust ? 100 : 56;
    const impact = Math.min(38, Math.round((BUILD_POWER_BONUS[name]||0)*0.45));
    const tier = ({S:24,A:16,B:10,C:4,D:0}[c.tier]||0);
    const part = base + impact + tier;
    maxScore += part;
    if(owned.has(normalizeCardName(name))) score += part;
  });

  if(must.length && mh>=must.length) score += 10;
  if(must.length && mh>=must.length) maxScore += 10;

  let pct=buildScoreToPct(score,maxScore||1);
  if(score>0 && pct<6) pct=6;
  let level=1;
  if(pct>=100) level=5;
  else if(pct>=85) level=4;
  else if(pct>=60) level=3;
  else if(pct>=40) level=2;
  return {pct,level,score,maxScore};
}
function renderBuildCompletion(a,mh,rh){
  const st=getBuildCompletionState(a,mh,rh);
  const key=`${curChar}:${a.id}`;
  const prev=BUILD_COMPLETION_MEM[key];
  const rankUp=!!prev && st.level>prev.level;
  BUILD_COMPLETION_MEM[key]=st;
  const suffix=rankUp?'!':'';
  const perfect=st.pct>=100;
  return `<span class="build-completion level-${st.level}${rankUp?' rank-up':''}${perfect?' perfect':''}"><span class="flame-wrap"><span class="flame-burst"></span><span class="flame-ring"></span><span class="flame-sparks"></span><span class="flame-icon"></span></span><span class="completion-text">${a.name} 완성도 <span class="percent">${st.pct}%</span>${suffix}</span>${perfect?'<span class="fireworks"></span>':''}</span>`;
}


const BUILD_POWER_BONUS={
  '지옥검무':90,'바리케이드':48,'창의적인 인공지능':44,'서브루틴':34,'카운트다운':42,'도망칠 수 없다':42,
  '서류 폭풍':38,'장막 관통자':38,'잿빛 혼령':34,'장송가':32,'무덤지기':32,'냉정함':26,'조각모음':26,
  '제압':26,'포악함':24,'파열':30,'불타는조약':30,'어둠의포옹':30,'창의적인 인공지능':44,'바리케이드':48
};
function buildTierBonus(t){ return ({S:36,A:18,B:8,C:0,D:-8}[t]||0); }
function buildRarityBonus(r){ return ({'레어':22,'언커먼':10,'커먼':0,'시작':-28}[r]||0); }
function buildStarterFactor(name,count){
  const starter=(START_DECKS[curChar]||[]).filter(x=>x===name).length;
  if(!starter) return count;
  const starterSeen=Math.min(count, starter);
  const extra=Math.max(0, count-starter);
  return starterSeen*0.12 + extra*1.0;
}
function detectBuildScores(){
  const d=D();
  const stage=getRunStage();
  const counts=deck.reduce((m,n)=>{ const k=normalizeCardName(n); m[k]=(m[k]||0)+1; return m; },{});
  return d.archs.map(a=>{
    let score=0, mh=0, rh=0, touched=0, anchor=0;
    const names=[...new Set([...(a.must||[]), ...(a.rec||[])])];
    names.forEach(name=>{
      const cnt=counts[normalizeCardName(name)]||0;
      if(!cnt) return;
      const card=d.cards.find(x=>x.n===name) || {};
      const inMust=(a.must||[]).includes(name);
      const factor=buildStarterFactor(name,cnt);
      if(!factor) return;
      if(inMust) mh += cnt; else rh += cnt;
      touched += factor;
      let w=(inMust?72:30) + buildTierBonus(card.tier) + buildRarityBonus(card.r) + (BUILD_POWER_BONUS[name]||0);
      if(stage.stage==='early'){
        if(inMust) w += 10;
        if(card.tier==='S') w += 8;
      }else if(stage.stage==='mid'){
        if(inMust) w += 4;
      }else{
        if(inMust) w += 8;
        if((a.rec||[]).includes(name)) w += 4;
      }
      if((BUILD_POWER_BONUS[name]||0) >= 60) anchor += 1;
      score += w * factor;
    });

    if(mh>0 && rh>0) score += 18;
    else if(mh>0) score += 10;
    else if(rh>=2) score += 8;

    // build density: cards already leaning into same build should matter
    score += touched * (stage.stage==='early' ? 5 : 8);

    // early sensitive start: a single strong S/필수 should already open the build
    if(stage.stage==='early' && mh>0) score += 12;
    if(stage.stage==='early' && anchor>0) score += 18 * anchor;

    return {id:a.id,score,mh,rh,touched,anchor};
  }).sort((a,b)=>b.score-a.score);
}
function detectBuild(){
  const scored=detectBuildScores();
  const top=scored[0];
  if(!top) return null;
  const minScore = getRunStage().stage==='early' ? 26 : 34;
  if(top.score < minScore) return null;
  return top.id;
}

function getActiveBuild(){return buildId||detectBuild()}


function scoreCard(name){
  const d=D();const c=getCardMeta(name);
  if(!c)return{score:0,reasons:['정보 없음'],tier:'?',warn:false,summary:'정보 없음',chips:[['mid','판단 보류']]};
  const activeBid=getActiveBuild();
  const activeBuild=activeBid?d.archs.find(x=>x.id===activeBid):null;
  const runStage=getRunStage();
  const ctx=detectRewardContext();
  let s=TS[c.tier]||0;const R=[];const chips=[];let warn=false;
  const dupes=deck.filter(x=>x===name).length;
  const totalCards=deck.length;
  const early=runStage.stage==='early';
  const mid=runStage.stage==='mid';
  const late=runStage.stage==='late';
  const combo=getComboMatches(name,d);
  const buildRefs=getCardBuildRefs(name,d);
  const inActive=!!(activeBuild&&(listHasCard(activeBuild.must,name)||listHasCard(activeBuild.rec,name)));
  const basicSet=new Set(BA());
  const cost=(typeof c.c==='number') ? c.c : (c.c==='X'?1:1);
  const cheap=cost<=1;
  const hasAny=(arr)=>arr.some(n=>deck.includes(n));
  const soulEnablers=['강탈','장송가','출몰','혼령 포획','강령회','분리'];
  const buildRefsAll=getCardBuildRefs(name,d);
  const mustRefs=buildRefsAll.filter(a=>listHasCard(a.must,name));
  const recRefs=buildRefsAll.filter(a=>listHasCard(a.rec,name));
  const anchorBonus=(BUILD_POWER_BONUS[name]||0);
  const highPowerSingles=new Set(['불사','지옥검무','바리케이드','창의적인 인공지능','권역']);
  const buildCommit=getBuildCommitLevel(activeBuild);

  if(curChar==='necro' && name==='영혼 폭풍' && !hasAny(soulEnablers)){
    s-=26; warn=true; chips.push(['bad','엔진 없음']); R.push('영혼 생성 카드가 아직 없어 기대값이 낮음');
  }

  if(activeBuild){
    if(listHasCard(activeBuild.must,name)){
      s += early ? 64 : 74;
      s += Math.round(anchorBonus*0.24);
      s += ({S:18,A:12,B:6,C:0,D:-6}[c.tier]||0);
      if(buildCommit>=4) s += 16;
      if(ctx.isBossReward) s += 34;
      chips.push(['good','필수']);
      R.push(`${activeBuild.name}${josa(activeBuild.name)} 잘 맞습니다`);
    }else if(listHasCard(activeBuild.rec,name)){
      s += early ? 30 : 40;
      s += Math.round(anchorBonus*0.18);
      s += ({S:16,A:12,B:6,C:0,D:-6}[c.tier]||0);
      if(buildCommit>=4) s += 22;
      if(buildCommit>=6) s += 14;
      if(ctx.isBossReward) s += 28;
      chips.push(['good','시너지']);
      R.push(`${activeBuild.name}${josa(activeBuild.name)} 잘 맞습니다`);
    }else if(buildRefs.length && !early){
      s-=12; warn=true; chips.push(['bad','오프빌드']); R.push(`지금 방향과는 거리 있음`);
    }
  }else{
    if(mustRefs.length){
      s+=26 + Math.round(anchorBonus*0.14); chips.push(['mid','빌드 시동']); R.push(`${mustRefs[0].name} 방향을 열어주는 카드`);
    }else if(recRefs.length){
      s+=12 + Math.round(anchorBonus*0.10); chips.push(['mid','빌드 후보']); R.push(`${recRefs[0].name} 후보 카드`);
    }
  }

  // same-build cards: value tier/impact more than just immediate combo
  if(combo.full.length){
    const comboBoost = inActive ? 20 : 58;
    s+=comboBoost;
    chips.push(['good', inActive ? '지금 강함' : '지금 강함']);
    R.push(inActive ? `${activeBuild.name}${josa(activeBuild.name)} 잘 맞습니다` : '지금 뽑으면 바로 강해집니다');
  }else if(combo.partial.length){
    const comboBoost = inActive ? 10 : 24;
    s+=comboBoost;
    chips.push(['mid','나중에 좋아짐']);
    R.push('후속 카드가 붙을수록 더 좋아집니다');
  }

  if(d.uni.includes(name) && dupes===0){
    s+=18; chips.push(['mid','범용']); R.push('단독 성능이 좋은 카드');
  }

  // single-card power exceptions
  if(highPowerSingles.has(name)){
    s += 42;
    if(early) s += 16;
    if(ctx.isBossReward) s += 14;
    chips.push(['mid','고점 카드']);
    R.push('카드 자체 체급이 높은 편');
  }

  if(early){
    if((c.tier==='S'||c.tier==='A') && dupes===0){
      s+=10;
      if(!chips.some(([k,v])=>['지금 강함','필수','강화','빌드 시동'].includes(v))) chips.push(['mid','초반 안정성']);
    }
    if(c.t==='공격' && cheap){ s+=12; if(!chips.some(([k,v])=>v==='초반 안정성')) chips.push(['mid','전투력']); }
    if(c.t==='스킬' && cheap && c.tier==='A') s+=4;
    if(c.t==='파워' && !combo.full.length && !inActive && c.tier!=='S' && !mustRefs.length && !highPowerSingles.has(name)){ s-=14; R.push('지금은 바로 강해지지 않음'); }
  }else if(mid){
    if(c.t==='파워' && inActive) s+=10;
    if(mustRefs.length) s+=8;
  }else if(late){
    if(c.t==='파워' && inActive) s+=12;
    if(combo.partial.length) s+=6;
  }

  // boss rewards should favor commitment over generic safe S picks
  if(ctx.isBossReward){
    if(activeBuild && buildCommit>=4){
      if(inActive) s += 24;
      else if(c.tier==='S') s -= 18;
    }
    if(activeBuild && (listHasCard(activeBuild.must,name) || listHasCard(activeBuild.rec,name))) {
      s += 18;
    }
  }

  if(totalCards>=18 && !inActive && !combo.full.length && c.tier!=='S' && !mustRefs.length && !highPowerSingles.has(name)){
    s-=18; warn=true; chips.push(['bad','덱 오염']); R.push('덱이 커져서 회전이 느려짐');
  }else if(totalCards>=15 && !inActive && !combo.full.length && c.tier==='B' && !mustRefs.length && !highPowerSingles.has(name)){
    s-=8; R.push('지금은 우선순위 낮음');
  }

  if(dupes>=2){
    s-=55; warn=true; chips.push(['bad','중복']); R.push(`이미 ${dupes}장 보유`);
  }else if(dupes===1){
    if(['폼멜타격','촉진제','촉매','계산된 도박','곡예','서류 폭풍','반향'].includes(name)){
      s+=6; R.push('2장째도 고려 가능');
    }else{
      s-=26; warn=true; chips.push(['bad','중복']); R.push('이미 1장 있음');
    }
  }

  if(c.tier==='D'){s-=25;warn=true;chips.push(['bad','기본 카드']);R.push('기본 카드는 줄이는 편이 좋음')}
  if(basicSet.has(name) && totalCards>10){s-=20;warn=true; if(!R.some(r=>r.includes('기본'))) R.push('기본 카드는 교체 대상');}

  if(!R.length) R.push(c.tip||'무난한 카드');
  R.splice(0,2);
  let summary='지금 뽑아도 무난함';
  if(chips.some(c=>c[1]==='필수')) summary='이 카드들이 없으면 빌드가 완성되지 않습니다';
  else if(chips.some(c=>c[1]==='시너지')) summary='이 카드들이 모일수록 빌드가 제대로 굴러가기 시작합니다';
  else if(chips.some(c=>c[1]==='지금 강함')) summary='지금 뽑으면 바로 강해집니다';
  else if(chips.some(c=>c[1]==='빌드 시동')) summary='지금 집으면 한 빌드 방향을 열기 좋음';
  else if(chips.some(c=>c[1]==='빌드 후보')) summary='후속 카드가 붙으면 빌드 후보가 될 수 있음';
  else if(chips.some(c=>c[1]==='오프빌드')) summary='덱과는 다르지만 성능이 강함';
  else if(chips.some(c=>c[1]==='엔진 없음')) summary='핵심 재료가 없어 지금은 기대값이 낮음';
  else if(chips.some(c=>c[1]==='전투력')||chips.some(c=>c[1]==='초반 안정성')) summary='초반 전투력 보강용으로 좋음';
  else if(chips.some(c=>c[1]==='덱 오염')) summary='지금은 넣을수록 덱이 무거워짐';
  return {score:s,reasons:R,tier:c.tier,warn,summary,chips};
}

function normalizeCardName(s){return (s||'').replace(/\s+/g,'').replace(/[!'?.,:+\-]/g,'')}
function relicImgSrc(name){const base=(name||'').replace(/\s+/g,'').replace(/[!'?.,:+\-]/g,'');return IMG+encodeURIComponent(base)+'.webp'}
function makeRelicImg(name){const img=document.createElement('img');img.className='relic-tile-img';img.loading='lazy';img.onerror=function(){const ph=document.createElement('div');ph.className='relic-tile-ph';ph.textContent='유물';this.replaceWith(ph)};img.src=relicImgSrc(name);return img}
async function enrichCardsFromRepo(){
  if(REPO_LOADED) return;
  try{
    const res=await fetch(REPO_API);
    if(!res.ok) return;
    const files=await res.json();
    const suffixToChar={Ironclad:'ironclad',Silent:'silent',Defect:'defect',Necrobinder:'necro',Regent:'regent'};
    const byChar={ironclad:IC_CARDS,silent:SI_CARDS,defect:DE_CARDS,necro:NE_CARDS,regent:RE_CARDS};
    const repoNames={ironclad:[],silent:[],defect:[],necro:[],regent:[]};
    const relicNames=[];

    (files||[]).forEach(f=>{
      if(!f.name || !/\.webp$/i.test(f.name)) return;
      const base=f.name.replace(/\.webp$/i,'');
      const m=base.match(/^(.+?)_(Ironclad|Silent|Defect|Necrobinder|Regent)$/);
      if(m){
        const rawName=m[1];
        const charKey=suffixToChar[m[2]];
        repoNames[charKey].push(rawName);
      }else{
        relicNames.push(base);
      }
    });

    REPO_RELIC_NAMES=[...new Set(relicNames)];
    REPO_RELIC_SET=new Set(REPO_RELIC_NAMES.map(normalizeCardName));

    Object.entries(byChar).forEach(([charKey,arr])=>{
      const metaByNorm=new Map(arr.map(c=>[normalizeCardName(c.n),c]));
      const unique=[];
      const seen=new Set();
      repoNames[charKey].forEach(name=>{
        const clean=normalizeCardName(name);
        if(seen.has(clean)) return;
        seen.add(clean);
        unique.push(metaByNorm.get(clean)||{n:name,c:'?',t:'카드',r:'기타',tier:'B',tip:'정보 준비중'});

function attachCharRowDrag(){
  const row=document.getElementById('charRow');
  if(!row || row.dataset.dragBound==='1') return;
  row.dataset.dragBound='1';
  let isDown=false,startX=0,startLeft=0,moved=false;
  const end=()=>{isDown=false;row.classList.remove('dragging')};
  row.addEventListener('mousedown',e=>{
    isDown=true; moved=false; startX=e.pageX; startLeft=row.scrollLeft; row.classList.add('dragging');
  });
  row.addEventListener('mousemove',e=>{
    if(!isDown) return;
    const dx=e.pageX-startX;
    if(Math.abs(dx)>4) moved=true;
    row.scrollLeft=startLeft-dx;
  });
  row.addEventListener('mouseleave',end);
  window.addEventListener('mouseup',end);
  row.addEventListener('click',e=>{ if(moved) { e.preventDefault(); e.stopPropagation(); moved=false; } }, true);
}

  }

  const top=scored[0];
  const skipBest=!top || top.score<=skipScore || top.warn;

  const active=getActiveBuild();
  const arch=active?D().archs.find(x=>x.id===active):null;
  let skipSummary=isShopMode ? '남은 카드 중 지금 살 가치가 높지 않습니다' : '지금은 스킵보다 집는 쪽이 낫습니다';

function getDeckActionHints(){
  const d=D();
  const activeBid=getActiveBuild();
  const active=activeBid?d.archs.find(x=>x.id===activeBid):null;
  const basicSet=new Set(BA());
  const starterList=(START_DECKS[curChar]||[]).slice();
  const stage=getRunStage();
  const counts=deck.reduce((m,n)=>{ const k=normalizeCardName(n); m[k]=(m[k]||0)+1; return m; },{});
  const tierScore=t=>({S:34,A:22,B:12,C:4,D:-8,'?':0}[t]||0);
  const countNonStarterCards=()=>{
    const pool=starterList.slice();
    let extra=0;
    deck.forEach(name=>{
      const idx=pool.indexOf(name);
      if(idx>=0) pool.splice(idx,1);
      else extra += 1;
    });
    return extra;
  };

  const extraCount=countNonStarterCards();
  let bestRemove={idx:-1,score:-1,name:null};
  let bestUpgrade={idx:-1,score:-1,name:null};

  deck.forEach((name,idx)=>{
    const c=(d.cards||[]).find(x=>x.n===name)||{};
    const inMust=!!(active && (active.must||[]).includes(name));
    const inRec=!!(active && (active.rec||[]).includes(name));
    const dupe=(counts[name]||0);

    // remove heuristic: starter/basic + low tier + off-build + duplicates
    let rs=0;
    if(basicSet.has(name)) rs+=38;
    if(curChar==='ironclad' && name==='강타') rs+=18;
    if(curChar==='silent' && name==='생존자') rs-=10;
    if(curChar==='silent' && name==='무력화') rs-=8;
    rs += ({D:28,C:16,B:4,A:-8,S:-18}[c.tier]||0);
    rs += ({'시작':20,'일반':0,'고급':-4,'레어':-10}[c.r]||0);
    if(active){
      if(inMust) rs-=90;
      else if(inRec) rs-=42;
      else rs+=18;
    }else{
      if((BUILD_POWER_BONUS[name]||0)>=34) rs-=20;
    }
    if(dupe>1) rs += Math.min(24, (dupe-1)*12);
    if(stage.stage==='early' && !basicSet.has(name)) rs-=12;
    if(deck.length>=18) rs+=8;
    if(deck.length>=24) rs+=10;

    if(rs>bestRemove.score){
      bestRemove={idx,score:rs,name};
    }

    // upgrade heuristic: on-build + power cards + good tiers
    if(isUpgradedCardIdx(idx)) return;
    let us=0;
    if(inMust) us+=92;
    else if(inRec) us+=56;
    us += (BUILD_POWER_BONUS[name]||0);
    us += Math.max(0,tierScore(c.tier));
    us += ({'레어':18,'고급':8,'일반':0,'시작':-24}[c.r]||0);
    if(dupe>1 && !basicSet.has(name)) us += Math.min(12,(dupe-1)*6);
    if(active && !inMust && !inRec) us -= 8;
    if(basicSet.has(name)) us -= 18;
    if(stage.stage==='early' && c.tier==='S') us += 12;
    if(stage.stage==='late' && inMust) us += 10;

    if(us>bestUpgrade.score){
      bestUpgrade={idx,score:us,name};
    }
  });

  const removeThreshold = deck.length>=22 ? 34 : deck.length>=16 ? 44 : 54;
  const upgradeThreshold = 58;

  // avoid showing same card for both. prioritize upgrade when overlap.
  let removeIdx = (extraCount>=1 && bestRemove.score>=removeThreshold) ? bestRemove.idx : -1;
  let upgradeIdx = bestUpgrade.score>=upgradeThreshold ? bestUpgrade.idx : -1;
  if(removeIdx===upgradeIdx && upgradeIdx!==-1){
    // keep upgrade if it is clearly meaningful, else keep remove
    if(bestUpgrade.score - bestRemove.score < 10) removeIdx=-1;
    else removeIdx=-1;
  }
  return {removeIdx, upgradeIdx};
}

function getSkipScore(){
  const activeBid=getActiveBuild();const d=D();const a=activeBid?d.archs.find(x=>x.id===activeBid):null;
  const early=isAct1Like();
  if(early) return totalCards=deck.length, totalCards>=16?18:6;
  if(!a) return deck.length>=16?16:8;
  const md=countDeckMatches(a.must);
  const rd=countDeckMatches(a.rec);
  if(md===0&&rd===0) return deck.length>=16?16:8;
  if(md<a.must.length) return deck.length>=17?18:10;
  return deck.length>=16?20:14;
}

function getBuildCommitLevel(build){
  if(!build) return 0;
  const mustCount=countDeckMatches(build.must||[]);
  const recCount=countDeckMatches(build.rec||[]);
  return mustCount*2 + recCount;
}

function handleGlobalHotkeys(e){
  if(e.isComposing || e.ctrlKey || e.metaKey || e.altKey) return;
  if(e.repeat) return;
  const activeEl=document.activeElement;
  if(isTypingTarget(activeEl)) return;

  if(e.code==='Backquote'){
    if(isSearchModalOpen() || currentTab!=='live') return;
    const resultWrap=document.getElementById('resultSection');
    const resultVisible=!!resultWrap && (resultWrap.classList.contains('open') || resultWrap.style.display!== 'none');
    if(!resultVisible) return;
    e.preventDefault();
    e.stopPropagation();
    if(typeof e.stopImmediatePropagation==='function') e.stopImmediatePropagation();
    const skipBtn = document.querySelector('#resultBody .res-skip-compact .res-compact-btn');
    if(skipBtn){
      skipBtn.click();
    }else{
      doSkip();
    }
    return false;
  }

  if(e.defaultPrevented) return;
  if(e.code==='KeyQ'){
    if(currentTab!=='live' || isSearchModalOpen()) return;
    e.preventDefault();
    setMode('reward');
    return;
  }
  if(e.code==='KeyW'){
    if(currentTab!=='live' || isSearchModalOpen()) return;
    e.preventDefault();
    setMode('shop');
    return;
  }
  if(e.code==='KeyE'){
    if(isSearchModalOpen()) return;
    e.preventDefault();
    openPrimaryCardSearch();
    return;
  }
  if(e.code==='KeyR'){
    if(isSearchModalOpen()) return;
    e.preventDefault();
    openDeckAdd();
    return;
  }
  if(e.code==='Escape'){
    if(isSearchModalOpen()){
      e.preventDefault();
      closeSearch();
      return;
    }
  }
}

    // spotlight
    spot.style.top = top + 'px';
    spot.style.left = left + 'px';
    spot.style.width = width + 'px';
    spot.style.height = height + 'px';

    // dark outside only
    dimTop.style.top = '0px';
    dimTop.style.left = '0px';
    dimTop.style.width = '100vw';
    dimTop.style.height = top + 'px';

    dimBottom.style.top = (top + height) + 'px';

    let bTop = top + height + 12;
    let bLeft = left + (width / 2) - (bw / 2);
    bubble.classList.remove('above');

    if(bTop + bh > window.innerHeight - 12){
      bTop = Math.max(12, top - bh - 12);
      bubble.classList.add('above');

    bLeft = Math.max(12, Math.min(bLeft, window.innerWidth - bw - 12));

  function finishCurrent(){
    if(mode === 'intro'){
      if(introIdx < introSteps.length - 1){
        introIdx += 1;
        renderIntro();
      }else{
        try{ localStorage.setItem(INTRO_KEY, '1'); }catch(e){}
        closeOverlay();
      }
      return;
    }
    if(mode === 'hint' && currentHint){
      if(currentHint.key === SEARCH_INPUT_KEY){
        try{ localStorage.setItem(SEARCH_INPUT_KEY, '1'); }catch(e){}
        const input = $('modalInput');
        if(input && !input.value){
          input.value = 'ㅌㄱ';
          if(typeof renderSearchGrid === 'function') renderSearchGrid();
        }
        showHint(SEARCH_RESULT_KEY, '#searchGridWrap .sg-card', isPCOnboard() ? '1~9 단축키로 카드를 선택할 수 있어요' : '카드를 눌러 선택할 수 있어요');
        return;
      }
      try{ localStorage.setItem(currentHint.key, '1'); }catch(e){}
      closeOverlay();
    }
  }

  function prevIntro(){
    if(mode !== 'intro') return;
    if(introIdx > 0){
      introIdx -= 1;
      renderIntro();
    }
  }

  // watch modal open for guide detail
  const detailObserver = new MutationObserver(() => {
    const modal = $('detailModal');
    if(!modal || !modal.classList.contains('open')) return;
    if(currentTab !== 'guide') return;
    const target = q('.detail-box .guide-group.core, .detail-box .guide-group.key, .detail-box .mini-grid, .detail-box');
    if(target){
      showHint(GUIDE_DETAIL_KEY, '.detail-box .guide-group.core, .detail-box .guide-group.key, .detail-box .mini-grid, .detail-box', '여기서 필수 카드와 시너지 카드를 볼 수 있어요');
    }
  });

  // patch setAppTab for per-tab hints
  const originalSetAppTab = typeof setAppTab === 'function' ? setAppTab : null;
  if(originalSetAppTab){
    window.setAppTab = function(tab){
      originalSetAppTab(tab);
      setTimeout(() => {
        if(tab === 'live'){
          showHint(LIVE_PICKER_KEY, '#pickerSection', isPCOnboard() ? '카드를 선택하면 추천받을 수 있어요. 단축키로 편리하게 쓸 수 있어요.' : '카드를 선택하면 추천받을 수 있어요');
        }
      }, 120);
    };
  }

  // patch openDeckAdd: modal opens normally, onboarding starts when search input is focused
  const originalOpenDeckAdd = typeof openDeckAdd === 'function' ? openDeckAdd : null;
  if(originalOpenDeckAdd){
    window.openDeckAdd = function(){
      originalOpenDeckAdd();
    };
  }


  // search onboarding starts on input focus/click, not immediately on modal open
  const searchInput = $('modalInput');
  if(searchInput){
    const triggerSearchInputHint = function(){
      try{
        if(localStorage.getItem(SEARCH_INPUT_KEY)) return;
      }catch(e){}
      if(!$('searchModal') || !$('searchModal').classList.contains('open')) return;
      if(mode === 'hint' && currentHint && (currentHint.key === SEARCH_INPUT_KEY || currentHint.key === SEARCH_RESULT_KEY)) return;

      if(!searchInput.value){
        searchInput.value = 'ㅌㄱ';
        if(typeof renderSearchGrid === 'function') renderSearchGrid();
      }
      showHint(SEARCH_INPUT_KEY, '#modalInput', '초성으로 카드를 검색할 수 있어요');
    };

    searchInput.addEventListener('focus', triggerSearchInputHint);
    searchInput.addEventListener('click', triggerSearchInputHint);
  }

  // patch renderSearchGrid: result hint is shown only after search-input onboarding step is confirmed
  const originalRenderSearchGrid = typeof renderSearchGrid === 'function' ? renderSearchGrid : null;
  if(originalRenderSearchGrid){
    window.renderSearchGrid = function(){
      const result = originalRenderSearchGrid.apply(this, arguments);
      return result;
    };
  }

  document.addEventListener('click', function(e){
    if(e.target && e.target.id === 'hxNext') finishCurrent();
    if(e.target && e.target.id === 'hxPrev') prevIntro();
    if(e.target && e.target.id === 'hxSkip'){
      try{ localStorage.setItem(INTRO_KEY, '1'); }catch(e){}
      closeOverlay();
    }
  });

  window.addEventListener('resize', () => {
    if(mode === 'intro'){
      const step = introSteps[introIdx];
      const target = q(step.target);
      if(target) positionOverlay(target);
    }else if(mode === 'hint' && currentHint){
      const target = q(currentHint.targetSelector);
      if(target) positionOverlay(target);
    }
  });

  // keep detail observer active
  document.addEventListener('DOMContentLoaded', function(){
    const dm = $('detailModal');
    if(dm) detailObserver.observe(dm, { attributes:true, attributeFilter:['class'] });

    setTimeout(function(){
      try{
        if(!localStorage.getItem(INTRO_KEY)) startIntro();
      }catch(e){
        startIntro();
      }
    }, 400);
  });
})();

</script>

<script>
document.addEventListener('keydown', function (e) {
  if (e.key !== 'Escape') return;
  if (e.isComposing) return;

  const detailModal = document.getElementById('detailModal');
  if (detailModal && detailModal.classList.contains('open')) {
    e.preventDefault();
    e.stopPropagation();
    if (typeof closeDetail === 'function') closeDetail();
    else {
      detailModal.classList.remove('open');
      if (typeof updateBodyLock === 'function') updateBodyLock();
      else document.body.classList.remove('modal-lock');
    }
    return;
  }

  const searchModal = document.getElementById('searchModal');
  if (searchModal && searchModal.classList.contains('open')) {
    e.preventDefault();
    e.stopPropagation();
    if (typeof closeSearch === 'function') closeSearch();
    else {
      searchModal.classList.remove('open');
      if (typeof updateBodyLock === 'function') updateBodyLock();
      else document.body.classList.remove('modal-lock');
    }
    return;
  }

  if (selectedDeckIdx !== -1) {
    e.preventDefault();
    e.stopPropagation();
    selectedDeckIdx = -1;
    if (typeof renderDeck === 'function') renderDeck();
  }
}, true);
</script>


<script>
(function(){
  function ensureUpgradeSet(){
    if(window.upgradedIds instanceof Set) return window.upgradedIds;
    if(Array.isArray(window.upgradedIds)){
      window.upgradedIds = new Set(window.upgradedIds);
      return window.upgradedIds;
    }
    try{
      window.upgradedIds = new Set(window.upgradedIds || []);
    }catch(e){
      window.upgradedIds = new Set();
    }
    return window.upgradedIds;
  }

  window.ensureUpgradeSet = ensureUpgradeSet;

  const originalRenderDeck = window.renderDeck;
  if(typeof originalRenderDeck === 'function'){
    window.renderDeck = function(){
      ensureUpgradeSet();
      const out = originalRenderDeck.apply(this, arguments);
      const cards = document.querySelectorAll('#deckGrid .dk-card');
      cards.forEach((card, idx) => {
        const nameEl = card.querySelector('.dk-name-text');
        if(!nameEl) return;
        const setRef = ensureUpgradeSet();
        const isUp = setRef.has(idx);
        card.classList.toggle('upgraded', isUp);
        const base = (nameEl.textContent || '').replace(/\+$/,'');
        nameEl.textContent = isUp ? (base + '+') : base;
      });
      return out;
    };
  }
})();
</script>

<script>
/* === SHOP FLOW + SEARCH RESULT CLEANUP OVERRIDES === */

// 카드 검색 결과: profile/type 아이콘 제거
window.renderSearchGrid = function(){
  const wrap=document.getElementById('searchGridWrap');const q=document.getElementById('modalInput').value;const d=D();
  wrap.innerHTML='<div class="search-grid loading"></div>';
  const pool=deckAddMode?getCurrentCardPool().filter(c=>isSearchableCard(c,curChar)):getSearchPoolForSlot(activeSlot||0);
  let list;if(deckAddMode){list=pool.slice()}else{const ex=picks.filter((p,j)=>p&&j!==activeSlot);const pickable=pool.filter(c=>!BA().includes(c.n));list=pickable.filter(c=>!ex.includes(c.n))}
  list=list.map(c=>({card:c,rank:getSearchRank(c.n,q)})).filter(x=>isSearchableCard(x.card,curChar) && x.rank>-1).sort((a,b)=>b.rank-a.rank || a.card.n.length-b.card.n.length || a.card.n.localeCompare(b.card.n,'ko')).map(x=>x.card);
  searchResultList=list.slice();
  searchResultAction=[];
  if(!list.length){wrap.innerHTML='<div class="search-empty">결과 없음</div>';return}
  let prog='';
  if(!deckAddMode){
    const need=getNeedCount();
    prog='<div class="slot-progress">'+Array.from({length:need},(_,i)=>`<span class="slot-dot ${i===activeSlot?'on':''} ${mode==='shop'&&isShopColorlessSlot(i)?'colorless':''}"></span>`).join('')+`<span class="slot-text">${getSlotLabel(activeSlot)} 선택</span></div>`;
    if(mode==='shop'){
      prog+=`<div class="slot-hint">${isShopColorlessSlot(activeSlot)?'이 슬롯은 중립 카드만 검색됩니다.':'이 슬롯은 현재 클래스 카드만 검색됩니다.'}</div>`;
    }
  }
  const grid=document.createElement('div');grid.className='search-grid';
  list.forEach((card,idx)=>{
    const el=document.createElement('div');el.className='sg-card';
    const choose=()=>{
      if(deckAddMode){
        pushDeckCard(card.n);closeSearch();renderAll();
        setTimeout(()=>{},50);
        return;
      }
      picks[activeSlot]=card.n;
      const need=getNeedCount();
      const next=Array.from({length:need},(_,i)=>i).find(i=>!picks[i]);
      if(next!==undefined){
        activeSlot=next;
        document.getElementById('modalTitle').textContent=getSlotLabel(next)+' 선택';
        document.getElementById('modalInput').value='';
        renderRewardRow(); renderSearchGrid(); ensureSearchInputFocus();
      } else {
        closeSearch(); renderAll('to-result');
      }
    };
    searchResultAction[idx]=choose;
    el.onclick=choose;
    const img=makeImg(card.n,'sg');el.appendChild(img);
    const showKeycaps=(window.innerWidth>768);
    if(showKeycaps && idx<9) el.innerHTML+=`<span class="search-keycap">${idx+1}</span>`;
    el.innerHTML+=`<div class="sg-name">${card.n}</div><span class="sg-tier tier-${card.tier}">${card.tier}</span>${UNLOCK[card.n]?'<div class="lock-corner">🔒</div>':''}`;
    grid.appendChild(el)
  });
  wrap.innerHTML=prog;wrap.appendChild(grid)
};

function shopRemoveCard(name){
  const idx = picks.findIndex(v => v===name);
  if(idx>=0) picks[idx]='';
}
function remainingShopCards(){
  return picks.filter(Boolean);
}
window.buyShopCard = function(name){
  const from = picks.filter(Boolean);
  pushDeckCard(name);
  hist.push({p:`구매:${name}`,f:from});
  shopRemoveCard(name);
  deckAddMode=false; activeSlot=-1;
  const remain = remainingShopCards();
  if(remain.length){
    setLastAction(`${name} 카드를 현재 덱에 추가했습니다.`, 'success');
    renderAll('to-result');
  }else{
    setLastAction(`${name} 카드를 구매하고 상점 선택을 마쳤습니다.`, 'success');
    finalizeShopCycle('구매 종료');
  }
};

window.shopSkipCard = function(name){
  shopRemoveCard(name);
  deckAddMode=false; activeSlot=-1;
  const remain = remainingShopCards();
  if(remain.length){
    clearLastAction();
    renderAll('to-result');
  }else{
    setLastAction('남은 상점 카드가 없어 구매를 종료했습니다.', 'info');
    finalizeShopCycle('구매 종료');
  }
};

window.pickCard = function(name){
  if(mode==='shop'){ buyShopCard(name); return; }
  pushDeckCard(name);
  setLastAction(`${name} 카드를 현재 덱에 추가했습니다.`, 'success');
  finalizeRewardCycle(name);
};

window.doSkip = function(){
  const from=picks.filter(Boolean);
  if(mode==='shop'){
    setLastAction('상점 구매를 종료했습니다.', 'info');
    if(from.length) hist.push({p:'구매 종료',f:from});
    deckAddMode=false;
    activeSlot=-1;
    picks=freshPicks();
    renderAll('to-picker');
    return;
  }
  setLastAction('현재 보상 카드를 스킵했습니다.', 'info');
  if(from.length) hist.push({p:'스킵',f:from});
  deckAddMode=false;
  activeSlot=-1;
  picks=freshPicks();
  renderAll('to-picker');
};

// 상점 결과 UI 재정의
window.renderResult = function(scored,skipScore){
  const sec=document.getElementById('resultSection');
  const body=document.getElementById('resultBody');
  const desc=sec.querySelector('.pc-result-desc');
  const isPc=window.innerWidth>768;
  if(desc) desc.style.display = isPc ? '' : 'none';

  if(!scored){
    body.innerHTML = lastActionMessage ? `<div class="result-feedback result-feedback-${lastActionKind||'info'}"><div class="feedback-icon">✓</div><div class="feedback-text">${lastActionMessage}</div></div>` : '';
    if(isPc){
      sec.style.display=''; sec.classList.add('open');
    }else{
      if(lastActionMessage){ sec.style.display=''; sec.classList.add('open'); }
      else { sec.style.display='none'; sec.classList.remove('open'); }
    }
    return;
  }
  sec.style.display=''; sec.classList.add('open');
  clearLastAction();
  body.innerHTML='';

  const isShopMode = mode==='shop';
  const top=scored[0];
  const skipBest=!top || top.score<=skipScore || top.warn;

  if(isShopMode){
    body.innerHTML += `<div class="res-note" style="margin-bottom:10px">카드를 구매하거나 넘기면서 계속 비교할 수 있습니다. 끝났다면 <span class="res-skip-keycap">\`</span>구매 종료를 누르세요.</div>`;
  }

  let cardHotkeyIndex = 1;
  scored.forEach((it,i)=>{
    const best = !skipBest && i===0 && it.score>skipScore && (it.score-skipScore>=8 || !it.warn);
    const div=document.createElement('div');
    div.className='res-item'+(best?' best':'')+(!best?' res-compact-choice':'');
    div.dataset.rank = String(i+1);
    const hotkey = window.innerWidth>768 ? (cardHotkeyIndex<=9 ? cardHotkeyIndex++ : null) : null;
    const head=document.createElement('div');
    head.className='res-clickarea';
    head.onclick=()=>showDetail(it.name);
    const imgEl=makeImg(it.name,'sg');
    imgEl.style.cssText='width:'+(best?'70px':'44px')+';border-radius:8px;flex-shrink:0;border:1px solid var(--bd2)';
    head.appendChild(imgEl);
    let info='<div style="flex:1;min-width:0">';
    info+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">';
    if(best) info+=`<span class="res-badge" style="background:#22c55e">추천</span>`;
    info+=`<span class="res-title">${it.name}</span>`;
    const tierStyle = (skipBest && it.tier==='S') ? ' style="opacity:.62;filter:saturate(.7) brightness(.92)"' : '';
    info+=`<span class="res-tier-pill tier-${it.tier}"${tierStyle}>${it.tier}</span>`;
    info+='</div>';
    const compactChips = Array.from(new Map((it.chips||[]).map(ch=>[ch[1],ch])).values());
    if(compactChips.length){
      info+='<div class="res-state">';
      compactChips.slice(0,2).forEach(ch=>{info+=`<span class="res-chip ${ch[0]}">${ch[1]}</span>`});
      info+='</div>';
    }
    info+=`<div class="res-summary">${it.summary}</div>`;
    if(UNLOCK[it.name]) info+=`<div class="res-unlock-mini">🔒 해금 필요</div>`;
    if(best && it.reasons?.length) info+=`<div class="res-note">${it.reasons[0]}</div>`;
    info+='</div>';
    head.innerHTML+=info;
    div.appendChild(head);

    const hot = hotkey ? `<span class="res-action-keycap">${hotkey}</span>` : '';
    if(isShopMode){
      div.innerHTML += `<div class="shop-card-actions"><button class="res-compact-btn${best?' is-recommended':''}" onclick="buyShopCard('${it.name}')">${hot}이 카드 구매</button><button class="res-compact-btn shop-skip-btn" onclick="shopSkipCard('${it.name}')">이 카드 넘기기</button></div>`;
    }else{
      div.innerHTML += `<button class="res-compact-btn${best?' is-recommended':''}" onclick="pickCard('${it.name}')">${hot}이 카드 뽑기</button>`;
    }
    body.appendChild(div);
  });

  // bottom skip / end action
  const action=document.createElement('div');
  action.className='res-item res-skip-compact'+(skipBest?' best skip-best is-top-recommend':'');
  action.dataset.rank='skip';
  const skipSummary = isShopMode
    ? (skipBest ? '지금은 더 사기보다 여기서 구매를 끝내는 쪽이 낫습니다' : '상점 구매를 끝내려면 구매 종료를 누르세요')
    : (skipBest ? '지금은 집기보다 스킵하는 쪽이 낫습니다' : '지금은 스킵보다 집는 쪽이 낫습니다');
  action.innerHTML=`<div class="res-title-row">${skipBest?'<span class="res-badge" style="background:#22c55e;color:#fff">추천</span>':''}<span class="res-title">${isShopMode?'구매 종료':'스킵'}</span></div><div class="res-summary">${skipSummary}</div><button type="button" data-action="do-skip" class="res-compact-btn${skipBest?' is-recommended':''}" onclick="doSkip()"><span class="res-skip-keycap">\`</span>${isShopMode?'구매 종료':'스킵하기'}</button>`;
  body.appendChild(action);
};
</script>

<script>
(function(){
  const blockedSearchTerms = new Set(['profile','icon','portrait','avatar']);
  function normalizeText(v){
    return (v || '').toString().trim().toLowerCase();
  }
  function isBlockedCardEntry(card){
    if(!card) return false;
    const fields = [
      card.name, card.title, card.id, card.key, card.slug, card.image, card.img, card.type
    ].map(normalizeText);

    const joined = fields.join(' ');
    if (joined.includes('profile')) return true;

    const exact = fields.some(v => blockedSearchTerms.has(v));
    if (exact) return true;

    // image-only/profile-like dummy entries
    if ((normalizeText(card.name) === 'profile') || (normalizeText(card.title) === 'profile')) return true;

    return false;
  }

  const originalRenderSearchGrid = window.renderSearchGrid;
  if (typeof originalRenderSearchGrid === 'function') {
    window.renderSearchGrid = function(){
      // try to filter the source array commonly used by the page
      const candidateKeys = ['allCards','searchCards','cards','cardDb','CARD_DB'];
      candidateKeys.forEach((k) => {
        if (Array.isArray(window[k])) {
          window[k] = window[k].filter(c => !isBlockedCardEntry(c));
        }
      });

      const result = originalRenderSearchGrid.apply(this, arguments);

      // DOM-level cleanup fallback
      const grid = document.querySelector('#searchGridWrap, .search-grid, #searchGrid');
      if (grid) {
        [...grid.querySelectorAll('.sg-card, .search-card, .card')].forEach(el => {
          const label = (el.textContent || '').trim().toLowerCase();
          const img = (el.querySelector('img')?.getAttribute('src') || '').toLowerCase();
          if (label === 'profile' || label.includes(' profile') || img.includes('profile')) {
            el.remove();
          }
        });
      }
      return result;
    };
  }
})();
</script>

<script id="initial-hotkey-focus-fix">
(function(){
  function shouldStealFocus(){
    const ae = document.activeElement;
    if(!ae) return true;
    const tag = (ae.tagName||'').toUpperCase();
    if(tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT') return false;
    if(ae.isContentEditable) return false;

  }
  function ensureHotkeyFocus(){
    try{ window.focus(); }catch(e){}
    if(!shouldStealFocus()) return;
    try{
      if(!document.body.hasAttribute('tabindex')) document.body.setAttribute('tabindex','-1');
      document.body.focus({preventScroll:true});
    }catch(e){}
    try{
      const live = document.getElementById('liveTab');

        if(!live.hasAttribute('tabindex')) live.setAttribute('tabindex','-1');
        live.focus({preventScroll:true});
      }
    }catch(e){}
  }
  window.addEventListener('load', function(){
    ensureHotkeyFocus();
    setTimeout(ensureHotkeyFocus, 30);
    setTimeout(ensureHotkeyFocus, 180);
    setTimeout(ensureHotkeyFocus, 500);
  });
  window.addEventListener('pageshow', function(){
    ensureHotkeyFocus();
    setTimeout(ensureHotkeyFocus, 50);
  });
})();

<script id="search-logic-hotfix-20260411">
(function(){
  const SPACELESS = s => String(s||'').replace(/\s+/g,'').trim();
  const LOWER = s => SPACELESS(s).toLowerCase();

  function decomposeCompat(s){
    const map = {'ㄳ':'ㄱㅅ','ㄵ':'ㄴㅈ','ㄶ':'ㄴㅎ','ㄺ':'ㄹㄱ','ㄻ':'ㄹㅁ','ㄼ':'ㄹㅂ','ㄽ':'ㄹㅅ','ㄾ':'ㄹㅌ','ㄿ':'ㄹㅍ','ㅀ':'ㄹㅎ','ㅄ':'ㅂㅅ'};
    return Array.from(String(s||'')).map(ch => map[ch] || ch).join('');
  }
  function getInitialsLoose(name){
    return decomposeCompat(Array.from(String(name||'')).map(ch => {
      const code = ch.charCodeAt(0) - 44032;
      if(code < 0 || code > 11171) return ch.toLowerCase();
      return 'ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ'[Math.floor(code/588)] || ch;
    }).join(''));
  }
  function matchesLoose(name, q){
    const qq = LOWER(q);
    if(!qq) return true;
    const nn = LOWER(name);
    if(nn.includes(qq)) return true;

    const dq = decomposeCompat(qq);
    if(decomposeCompat(nn).includes(dq)) return true;

    const initials = getInitialsLoose(name);
    if(initials.includes(dq)) return true;

    return false;
  }

  // earlier search logic override
  window.getSearchRank = getSearchRank = function(name, q){
    const qq = LOWER(q);
    if(!qq) return 0;
    const nn = LOWER(name);
    const idx = nn.indexOf(qq);
    if(idx === 0) return 1000 - qq.length;
    if(idx > 0) return 700 - idx;

    const dq = decomposeCompat(qq);
    const dn = decomposeCompat(nn);
    const dIdx = dn.indexOf(dq);
    if(dIdx === 0) return 980 - dq.length;
    if(dIdx > 0) return 680 - dIdx;

    const initials = getInitialsLoose(name);
    const iIdx = initials.indexOf(dq);
    if(iIdx === 0) return 950 - dq.length;
    if(iIdx > 0) return 650 - iIdx;

    return -1;
  };
  window.matchSearch = matchSearch = function(name, q){ return window.getSearchRank(name, q) > -1; };

  // final rebuilt search override
  if(typeof window.renderSearchGrid === 'function'){
    const oldRenderSearchGrid = window.renderSearchGrid;
    window.renderSearchGrid = function(){
      try{
        const input = document.getElementById('modalInput');
        const wrap = document.getElementById('searchGridWrap');
        if(!input || !wrap) return oldRenderSearchGrid.apply(this, arguments);

        const q = input.value || '';

        // Always rebuild from the full list for the current context first.
        // This avoids query-on-query narrowing where long 초성 like ㅂㄱㄱㅊ / ㅌㅅㄹㅋㅇ
        // can disappear because an earlier filtered list gets reused.

        const fullList = Array.isArray(window.searchResultList) ? window.searchResultList.slice() : [];
        const fullActions = Array.isArray(window.searchResultAction) ? window.searchResultAction.slice() : [];
        input.value = q;

        if(!q){
          return result;
        }

        const ranked = fullList
          .map((card, idx) => ({ card, idx, rank: window.getSearchRank(card && card.n, q) }))
          .filter(x => x.rank > -1)
          .sort((a,b) => (b.rank - a.rank) || (String(a.card.n||'').length - String(b.card.n||'').length) || String(a.card.n||'').localeCompare(String(b.card.n||''), 'ko'));

        const filtered = ranked.map(x => x.card);
        const filteredActions = ranked.map(x => fullActions[x.idx]);

        window.searchResultList = filtered.slice();
        if(typeof searchResultList !== 'undefined') searchResultList = filtered.slice();
        window.searchResultAction = filteredActions.slice();
        if(typeof searchResultAction !== 'undefined') searchResultAction = filteredActions.slice();

        const prog = wrap.querySelector('.slot-progress') ? wrap.querySelector('.slot-progress').outerHTML + (wrap.querySelector('.slot-hint') ? wrap.querySelector('.slot-hint').outerHTML : '') : '';
        wrap.innerHTML = prog;

        if(!filtered.length){
          wrap.innerHTML = prog + '<div class="search-empty">결과 없음</div>';
          return result;
        }

        const grid = document.createElement('div');
        grid.className = 'search-grid';
        filtered.forEach((card, idx) => {
          const el = document.createElement('div');
          el.className = 'sg-card';

          const choose = filteredActions[idx];
          if(typeof choose === 'function') el.onclick = choose;

          const img = document.createElement('img');
          img.src = 'https://cdn.jsdelivr.net/gh/elithelucky/sts2-images@latest/' + (card.filename || (encodeURIComponent(SPACELESS(card.n)) + '.webp'));
          img.className = 'img-loading';
          img.onload = () => img.classList.remove('img-loading');
          img.onerror = () => {
            img.onerror = null;

          if(window.innerWidth > 768 && idx < 9){

            kc.textContent = String(idx + 1);

          el.insertAdjacentHTML('beforeend', `<div class="sg-name">${card.n}</div><span class="sg-tier tier-${card.tier||'C'}">${card.tier||'C'}</span>`);

        wrap.appendChild(grid);
        return result;
      }catch(e){
        return oldRenderSearchGrid.apply(this, arguments);
      }
    };
  }

  // recommendation guard: 때가 되었다 should not be pushed without doom package
  if(typeof scoreCard === 'function'){
    const oldScoreCard = scoreCard;
    const norm = s => SPACELESS(s);
    const doomSetupCards = ['역병 타격','비관적인 맥박','도망칠 수 없다','종말의 날','카운트다운','죽음 인도자','망각','사신의 형상'];
    const doomCard = '때가 되었다';
    window.scoreCard = scoreCard = function(name){
      const out = oldScoreCard.apply(this, arguments);
      try{
        if((typeof curChar !== 'undefined' && curChar === 'necro') && norm(name) === norm(doomCard)){
          const doomPieces = Array.isArray(deck) ? deck.filter(x => doomSetupCards.some(d => norm(d) === norm(x))) : [];
